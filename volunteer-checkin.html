<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>義工報到 | Salford Hongkongers</title>
<style>
:root {
  --pink: #ff2d78;
  --blue: #00d4ff;
  --purple: #b44fff;
  --green-neon: #39ff14;
  --bg: #0a0a0f;
  --card-bg: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.1);
  --text: #f0f0f0;
  --text-muted: rgba(255,255,255,0.45);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(255,45,120,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.08) 0%, transparent 50%);
}

/* NAV */
nav {
  background: rgba(10,10,15,0.95);
  border-bottom: 1px solid rgba(255,45,120,0.3);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}
nav .logo {
  color: #fff;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: -0.3px;
}
nav .logo span {
  color: var(--pink);
  text-shadow: 0 0 10px var(--pink);
}
nav .nav-time {
  color: var(--blue);
  font-size: 0.88rem;
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  text-shadow: 0 0 8px var(--blue);
}
nav .back-btn {
  color: var(--text-muted);
  font-size: 0.85rem;
  text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  transition: color 0.2s;
}
nav .back-btn:hover { color: var(--pink); }

/* LAYOUT */
.page {
  display: flex; flex-direction: column; gap: 16px;
  padding: 20px 16px 40px;
  max-width: 480px; margin: 0 auto; width: 100%;
}

/* CLOCK HERO */
.clock-hero {
  background: linear-gradient(135deg, rgba(255,45,120,0.15), rgba(0,212,255,0.1));
  border: 1px solid rgba(255,45,120,0.3);
  border-radius: var(--radius);
  padding: 28px 20px 22px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(255,45,120,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
}
.clock-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
  pointer-events: none;
}
.clock-display {
  font-size: 3.4rem; font-weight: 800;
  letter-spacing: 6px; font-variant-numeric: tabular-nums;
  line-height: 1; margin-bottom: 8px;
  color: #fff;
  text-shadow: 0 0 20px rgba(255,45,120,0.8), 0 0 40px rgba(255,45,120,0.4);
}
.clock-date {
  font-size: 0.9rem;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}

/* CARD */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 24px 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.08);
}

.section-title {
  font-size: 1.15rem; font-weight: 700;
  color: #fff; margin-bottom: 18px;
  letter-spacing: 0.3px;
  text-align: center;
}

/* NAME INPUT */
label {
  display: block;
  font-size: 0.88rem;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
input[type="text"] {
  width: 100%;
  padding: 14px 16px;
  font-size: 1.05rem;
  font-weight: 600;
  color: #fff;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  outline: none;
  transition: all 0.3s;
  letter-spacing: 0.5px;
}
input[type="text"]::placeholder {
  color: rgba(255,255,255,0.25);
  font-weight: 400;
}
input[type="text"]:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 2px rgba(255,45,120,0.2);
  background: rgba(255,255,255,0.1);
}

/* BUTTONS */
.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}
button {
  flex: 1;
  padding: 16px 12px;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  border: none;
  border-radius: 12px;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}
button.btn-clockin {
  background: linear-gradient(135deg, var(--green-neon), #00c853);
  color: #000;
  box-shadow: 0 4px 15px rgba(57,255,20,0.3);
}
button.btn-clockin:hover:not(:disabled) {
  box-shadow: 0 8px 25px rgba(57,255,20,0.5);
  transform: translateY(-2px);
}
button.btn-clockout {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  box-shadow: 0 4px 15px rgba(255,45,120,0.3);
}
button.btn-clockout:hover:not(:disabled) {
  box-shadow: 0 8px 25px rgba(255,45,120,0.5);
  transform: translateY(-2px);
}

/* TOAST */
.toast {
  display: none;
  padding: 16px 20px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  text-align: center;
  letter-spacing: 0.3px;
  animation: slideUp 0.3s ease forwards;
}
.toast.in {
  background: linear-gradient(135deg, rgba(57,255,20,0.2), rgba(0,212,255,0.1));
  border: 1px solid rgba(57,255,20,0.4);
  color: var(--green-neon);
  text-shadow: 0 0 10px rgba(57,255,20,0.5);
}
.toast.out {
  background: linear-gradient(135deg, rgba(255,45,120,0.2), rgba(180,79,255,0.1));
  border: 1px solid rgba(255,45,120,0.4);
  color: var(--pink);
  text-shadow: 0 0 10px rgba(255,45,120,0.5);
}
.toast .toast-name {
  display: block;
  font-size: 1.3rem;
  font-weight: 800;
  margin-bottom: 4px;
}
.toast .toast-time {
  display: block;
  font-size: 0.82rem;
  opacity: 0.7;
  font-variant-numeric: tabular-nums;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* LOG LIST */
.log-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 18px 20px;
  backdrop-filter: blur(10px);
}
.log-title {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 12px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.log-empty {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.88rem;
  padding: 10px 0;
}
.log-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.log-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.9rem;
}
.log-item.in  { background: rgba(57,255,20,0.08);  border: 1px solid rgba(57,255,20,0.2); }
.log-item.out { background: rgba(255,45,120,0.08); border: 1px solid rgba(255,45,120,0.2); }
.log-item .log-name { font-weight: 700; color: #fff; }
.log-item .log-badge {
  font-size: 0.72rem; font-weight: 800; letter-spacing: 0.5px;
  padding: 3px 8px; border-radius: 20px;
}
.log-item.in  .log-badge { background: rgba(57,255,20,0.2);  color: var(--green-neon); }
.log-item.out .log-badge { background: rgba(255,45,120,0.2); color: var(--pink); }
.log-item .log-time {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

/* SPINNER */
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.spinner {
  display: inline-block;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: currentColor;
  border-radius: 50%;
  width: 18px; height: 18px;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="back-btn" href="index.html">&#8592; 返回</a>
  <div class="logo">Salford<br/><span>Hongkongers</span></div>
  <div class="nav-time" id="navTime">--:--:--</div>
</nav>

<div class="page">

  <!-- CLOCK -->
  <div class="clock-hero">
    <div class="clock-display" id="clockDisplay">00:00</div>
    <div class="clock-date" id="clockDate">-</div>
  </div>

  <!-- CHECK-IN CARD -->
  <div class="card">
    <div class="section-title">義工報到</div>

    <label for="inputName">請輸入姓名</label>
    <input type="text" id="inputName" placeholder="例如：陳大文 / Chan Tai Man" autocomplete="off" autocorrect="off" spellcheck="false"/>

    <div class="btn-row" style="margin-top:18px;">
      <button class="btn-clockin"  id="btnClockIn"  disabled>Clock In</button>
      <button class="btn-clockout" id="btnClockOut" disabled>Clock Out</button>
    </div>
  </div>

  <!-- TOAST (feedback) -->
  <div class="toast" id="toast">
    <span class="toast-name" id="toastName"></span>
    <span class="toast-time" id="toastTime"></span>
  </div>

  <!-- LOG -->
  <div class="log-card">
    <div class="log-title">今日報到記錄</div>
    <div class="log-empty" id="logEmpty">暫無記錄</div>
    <ul class="log-list" id="logList" style="display:none;"></ul>
  </div>

</div>

<script>
// ── Clock ──────────────────────────────────────────────────────────
const WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockDisplay').textContent = `${hh}:${mm}`;
  document.getElementById('navTime').textContent = `${hh}:${mm}:${ss}`;
  const y = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d  = String(now.getDate()).padStart(2,'0');
  document.getElementById('clockDate').textContent =
    `${y}-${mo}-${d}  ${WEEKDAYS[now.getDay()]}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── Input → enable buttons ─────────────────────────────────────────
const inputName  = document.getElementById('inputName');
const btnClockIn  = document.getElementById('btnClockIn');
const btnClockOut = document.getElementById('btnClockOut');

inputName.addEventListener('input', () => {
  const ok = inputName.value.trim().length > 0;
  btnClockIn.disabled  = !ok;
  btnClockOut.disabled = !ok;
});

// ── Google Sheets API ──────────────────────────────────────────────
const SHEET_API = 'https://script.google.com/macros/s/AKfycbxlSEI9vj0rignRVwTWTNQvIoTvMFaHjySpknp8O4XtKkZ-hrHEuqwtNffiL7E0xfn_S/exec';

async function recordAttendance(name, type) {
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  try {
    const params = new URLSearchParams({ action: 'checkin', name, type, date: dateStr, time: timeStr });
    await fetch(`${SHEET_API}?${params}`);
  } catch(e) {
    // fail silently – local log still records
  }

  return { name, type, date: dateStr, time: timeStr };
}

// ── Handle Clock In / Out ──────────────────────────────────────────
async function handleAttendance(type) {
  const name = inputName.value.trim();
  if (!name) return;

  // Disable buttons during request
  btnClockIn.disabled  = true;
  btnClockOut.disabled = true;
  const activeBtn = type === 'in' ? btnClockIn : btnClockOut;
  const originalText = activeBtn.textContent;
  activeBtn.innerHTML = `<span class="spinner"></span>${originalText}`;

  const record = await recordAttendance(name, type);

  // Restore buttons
  activeBtn.textContent = originalText;
  const ok = inputName.value.trim().length > 0;
  btnClockIn.disabled  = !ok;
  btnClockOut.disabled = !ok;

  // Show toast
  showToast(record);

  // Add to log
  addLogItem(record);

  // Clear input
  inputName.value = '';
  btnClockIn.disabled  = true;
  btnClockOut.disabled = true;
  inputName.focus();
}

btnClockIn.addEventListener('click',  () => handleAttendance('in'));
btnClockOut.addEventListener('click', () => handleAttendance('out'));

// ── Toast ──────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(record) {
  const toast = document.getElementById('toast');
  document.getElementById('toastName').textContent =
    record.type === 'in' ? `✅ ${record.name} 已 Clock In！` : `👋 ${record.name} 已 Clock Out！`;
  document.getElementById('toastTime').textContent = `${record.date}  ${record.time}`;
  toast.className = `toast ${record.type}`;
  toast.style.display = 'block';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 3500);
}

// ── Log List ───────────────────────────────────────────────────────
const sessionLog = [];

function addLogItem(record) {
  sessionLog.unshift(record);
  const logEmpty = document.getElementById('logEmpty');
  const logList  = document.getElementById('logList');
  logEmpty.style.display = 'none';
  logList.style.display  = 'flex';

  const li = document.createElement('li');
  li.className = `log-item ${record.type}`;
  li.innerHTML = `
    <span class="log-name">${escapeHtml(record.name)}</span>
    <span class="log-badge">${record.type === 'in' ? 'CLOCK IN' : 'CLOCK OUT'}</span>
    <span class="log-time">${record.time}</span>
  `;
  logList.prepend(li);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Enter key support ──────────────────────────────────────────────
inputName.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && inputName.value.trim()) {
    btnClockIn.click();
  }
});
</script>
</body>
</html>
