<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>義工打卡 — Salford Hongkongers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 480px;
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo img { height: 52px; object-fit: contain; }
    h1 { font-size: 1.4rem; color: #1a1a2e; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 28px; }

    /* Step indicators */
    .steps {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .step {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700;
      background: #eee; color: #aaa;
      transition: all 0.3s;
    }
    .step.active { background: #c0392b; color: #fff; }
    .step.done   { background: #27ae60; color: #fff; }
    .step-line { flex: 1; height: 2px; background: #eee; align-self: center; max-width: 40px; }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }

    /* Autocomplete */
    .autocomplete-wrap { position: relative; }
    input[type="text"], input[type="tel"], input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #c0392b; }
    .dropdown {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: #fff;
      border: 1.5px solid #ddd;
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.95rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .dropdown-item:hover, .dropdown-item.selected { background: #fdecea; }
    .dropdown-item:last-child { border-bottom: none; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-primary { background: #c0392b; color: #fff; }
    .btn-primary:hover { background: #a93226; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-outline { background: #fff; color: #c0392b; border: 2px solid #c0392b; }
    .btn-outline:hover { background: #fdecea; }

    /* Check-in action buttons */
    .action-btns { display: flex; gap: 14px; margin-top: 8px; }
    .action-btns .btn { flex: 1; font-size: 1.1rem; padding: 16px; }
    .btn-signin  { background: #27ae60; color: #fff; }
    .btn-signin:hover  { background: #219150; }
    .btn-signout { background: #e67e22; color: #fff; }
    .btn-signout:hover { background: #ca6f1e; }

    /* Volunteer info card */
    .vol-card {
      background: #f8f9fa;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 20px;
    }
    .vol-card .vol-name { font-size: 1.2rem; font-weight: 700; color: #1a1a2e; }
    .vol-card .vol-id   { font-size: 0.85rem; color: #888; margin-top: 2px; }

    /* Success screen */
    .success-screen {
      text-align: center;
      padding: 20px 0;
    }
    .success-icon { font-size: 4rem; margin-bottom: 16px; }
    .success-screen h2 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 8px; }
    .success-screen .action-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 12px;
    }
    .badge-signin  { background: #e8f5e9; color: #27ae60; }
    .badge-signout { background: #fef3e2; color: #e67e22; }
    .success-screen .vol-name-big { font-size: 1.3rem; font-weight: 700; color: #c0392b; margin-bottom: 6px; }
    .success-screen .timestamp { font-size: 0.88rem; color: #888; }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 14px;
      display: none;
    }
    .alert.error { background: #fdecea; color: #c62828; border: 1px solid #ef9a9a; }

    .reg-link { text-align: center; margin-top: 20px; font-size: 0.88rem; color: #666; }
    .reg-link a { color: #c0392b; text-decoration: none; font-weight: 600; }

    .date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .date-row label { margin-bottom: 0; white-space: nowrap; font-size: 0.85rem; color: #555; }
    .date-row input { flex: 1; padding: 8px 12px; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="images/logo.png" alt="Salford Hongkongers" onerror="this.style.display='none'">
  </div>
  <h1>義工打卡</h1>
  <p class="subtitle">Volunteer Check-In / Check-Out<br>Salford Hongkongers CIC</p>

  <!-- Step indicators -->
  <div class="steps">
    <div class="step active" id="step1">1</div>
    <div class="step-line"></div>
    <div class="step" id="step2">2</div>
    <div class="step-line"></div>
    <div class="step" id="step3">✓</div>
  </div>

  <!-- Panel 1: Search name -->
  <div class="panel active" id="panel1">
    <div class="form-group">
      <label>義工登記名字 Volunteer Name</label>
      <div class="autocomplete-wrap">
        <input type="text" id="nameInput" placeholder="輸入名字搜尋... Type to search" autocomplete="off">
        <div class="dropdown" id="nameDropdown"></div>
      </div>
    </div>
    <div class="form-group">
      <label>電話尾四位 Last 4 digits of phone</label>
      <input type="tel" id="last4Input" placeholder="例：5678" maxlength="4" pattern="\d{4}">
    </div>
    <div class="alert error" id="step1Alert"></div>
    <button class="btn btn-primary" id="verifyBtn" onclick="verifyVolunteer()">核實身份 Verify</button>
  </div>

  <!-- Panel 2: Confirm & check-in/out -->
  <div class="panel" id="panel2">
    <div class="vol-card">
      <div class="vol-name" id="volName"></div>
      <div class="vol-id" id="volId"></div>
    </div>
    <div class="date-row">
      <label>活動日期：</label>
      <input type="date" id="eventDate">
    </div>
    <p style="font-size:0.9rem;color:#555;margin-bottom:16px;text-align:center;">請選擇：</p>
    <div class="action-btns">
      <button class="btn btn-signin"  onclick="doCheckIn('簽到')">✅ 簽到 Check In</button>
      <button class="btn btn-signout" onclick="doCheckIn('簽退')">🚪 簽退 Check Out</button>
    </div>
    <div class="alert error" id="step2Alert"></div>
    <button class="btn btn-outline" style="margin-top:14px;" onclick="goBack()">← 返回 Back</button>
  </div>

  <!-- Panel 3: Success -->
  <div class="panel" id="panel3">
    <div class="success-screen">
      <div class="success-icon" id="successIcon">✅</div>
      <div class="action-badge" id="actionBadge"></div>
      <div class="vol-name-big" id="successName"></div>
      <div class="timestamp" id="successTime"></div>
      <button class="btn btn-outline" style="margin-top:24px;max-width:200px;margin-left:auto;margin-right:auto;" onclick="reset()">再次打卡 Again</button>
    </div>
  </div>

  <div class="reg-link">
    未登記？<a href="volunteer-register.html">義工登記 →</a>
  </div>
</div>

<script>
  // ⚠️ 請將下方 URL 換成你的 Apps Script 部署 URL
  var APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

  var volunteers = [];
  var selectedVolunteer = null;

  // Set today's date as default
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('eventDate').value = today;

  // Load volunteer list on startup
  fetch(APPS_SCRIPT_URL + '?action=getVolunteers')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) volunteers = data.volunteers;
    })
    .catch(function() { console.warn('Could not load volunteers'); });

  // Autocomplete
  var nameInput = document.getElementById('nameInput');
  var dropdown  = document.getElementById('nameDropdown');

  nameInput.addEventListener('input', function() {
    var q = this.value.trim().toLowerCase();
    selectedVolunteer = null;
    if (!q) { dropdown.style.display = 'none'; return; }

    var matches = volunteers.filter(function(v) {
      return v.name.toLowerCase().includes(q);
    });

    if (matches.length === 0) { dropdown.style.display = 'none'; return; }

    dropdown.innerHTML = matches.map(function(v) {
      return '<div class="dropdown-item" onclick="selectVolunteer(' + JSON.stringify(v).replace(/"/g, '&quot;') + ')">' + v.name + '</div>';
    }).join('');
    dropdown.style.display = 'block';
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.autocomplete-wrap')) dropdown.style.display = 'none';
  });

  function selectVolunteer(v) {
    selectedVolunteer = v;
    nameInput.value = v.name;
    dropdown.style.display = 'none';
  }

  // Verify identity
  function verifyVolunteer() {
    var alert = document.getElementById('step1Alert');
    alert.style.display = 'none';

    var name  = nameInput.value.trim();
    var last4 = document.getElementById('last4Input').value.trim();

    if (!name)  { showAlert('step1Alert', '請輸入義工名字'); return; }
    if (!last4 || !/^\d{4}$/.test(last4)) { showAlert('step1Alert', '請輸入正確的電話尾四位（4位數字）'); return; }

    // Client-side pre-check
    var match = volunteers.find(function(v) {
      return v.name === name && v.phoneLast4 === last4;
    });

    if (!match && selectedVolunteer && selectedVolunteer.phoneLast4 !== last4) {
      showAlert('step1Alert', '電話尾四位不符，請重新確認');
      return;
    }

    if (match) {
      selectedVolunteer = match;
    }

    // Move to panel 2
    setStep(2);
    document.getElementById('volName').textContent = name;
    document.getElementById('volId').textContent = selectedVolunteer
      ? '義工編號：' + selectedVolunteer.id
      : '義工編號：— ';
  }

  // Do check-in / check-out
  function doCheckIn(action) {
    var btn1 = document.querySelector('.btn-signin');
    var btn2 = document.querySelector('.btn-signout');
    btn1.disabled = btn2.disabled = true;

    var payload = {
      action: 'checkIn',
      name:        nameInput.value.trim(),
      last4:       document.getElementById('last4Input').value.trim(),
      checkAction: action,
      eventDate:   document.getElementById('eventDate').value
    };

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        setStep(3);
        var isSignIn = action === '簽到';
        document.getElementById('successIcon').textContent  = isSignIn ? '✅' : '👋';
        document.getElementById('actionBadge').textContent  = isSignIn ? '✅ 簽到成功' : '🚪 簽退成功';
        document.getElementById('actionBadge').className    = 'action-badge ' + (isSignIn ? 'badge-signin' : 'badge-signout');
        document.getElementById('successName').textContent  = data.volunteer.name;
        document.getElementById('successTime').textContent  = data.timestamp;
      } else {
        showAlert('step2Alert', data.error);
      }
    })
    .catch(function() { showAlert('step2Alert', '網絡錯誤，請稍後再試'); })
    .finally(function() { btn1.disabled = btn2.disabled = false; });
  }

  function goBack() {
    setStep(1);
    document.getElementById('step2Alert').style.display = 'none';
  }

  function reset() {
    nameInput.value = '';
    document.getElementById('last4Input').value = '';
    selectedVolunteer = null;
    document.getElementById('step1Alert').style.display = 'none';
    setStep(1);
  }

  function setStep(n) {
    ['panel1','panel2','panel3'].forEach(function(id, i) {
      document.getElementById(id).className = 'panel' + (i+1 === n ? ' active' : '');
    });
    [1,2,3].forEach(function(i) {
      var el = document.getElementById('step' + i);
      if (i < n)      el.className = 'step done';
      else if (i === n) el.className = 'step active';
      else             el.className = 'step';
    });
  }

  function showAlert(id, msg) {
    var el = document.getElementById(id);
    el.textContent = '❌ ' + msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
