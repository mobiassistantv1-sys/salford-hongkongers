<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>義工堂刻 | Salford Hongkongers</title>
<style>
:root {
  --pink: #ff2d78;
  --blue: #00d4ff;
  --purple: #b44fff;
  --green-neon: #39ff14;
  --gold: #ffd700;
  --silver: #c0c0c0;
  --bronze: #cd7f32;
  --bg: #0a0a0f;
  --card-bg: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.1);
  --text: #f0f0f0;
  --text-muted: rgba(255,255,255,0.45);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(255,45,120,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.08) 0%, transparent 50%);
}

/* NAV */
nav {
  background: rgba(10,10,15,0.95);
  border-bottom: 1px solid rgba(255,45,120,0.3);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}
nav .logo { color: #fff; font-size: 1rem; font-weight: 800; letter-spacing: -0.3px; }
nav .logo span { color: var(--pink); text-shadow: 0 0 10px var(--pink); }
nav .nav-time {
  color: var(--blue); font-size: 0.88rem;
  font-variant-numeric: tabular-nums; font-weight: 700;
  text-shadow: 0 0 8px var(--blue);
}
nav .back-btn {
  color: var(--text-muted); font-size: 0.85rem;
  text-decoration: none; display: flex; align-items: center; gap: 4px;
  transition: color 0.2s;
}
nav .back-btn:hover { color: var(--pink); }

/* LAYOUT */
.page {
  display: flex; flex-direction: column; gap: 16px;
  padding: 20px 16px 40px;
  max-width: 480px; margin: 0 auto; width: 100%;
}

/* ─── LEADERBOARD ────────────────────────────────────────────────────────────── */
.leaderboard {
  background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(180,79,255,0.08));
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: var(--radius);
  padding: 20px 18px 18px;
  box-shadow: 0 0 20px rgba(255,215,0,0.08);
}
.lb-header {
  text-align: center;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 10px rgba(255,215,0,0.6);
  margin-bottom: 16px;
}
.lb-month {
  display: block;
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  margin-top: 3px;
  text-transform: none;
  font-weight: 500;
}
.lb-list {
  display: flex; flex-direction: column; gap: 10px;
  list-style: none;
}
.lb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.2s;
}
.lb-item:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.15);
}
.lb-rank {
  font-size: 1.1rem;
  font-weight: 800;
  width: 32px; text-align: center;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.lb-item.gold .lb-rank { color: var(--gold); text-shadow: 0 0 12px rgba(255,215,0,0.5); }
.lb-item.silver .lb-rank { color: var(--silver); text-shadow: 0 0 10px rgba(192,192,192,0.4); }
.lb-item.bronze .lb-rank { color: var(--bronze); text-shadow: 0 0 10px rgba(205,127,50,0.4); }
.lb-item:not(.gold):not(.silver):not(.bronze) .lb-rank { color: var(--text-muted); }

.lb-name {
  font-size: 0.92rem;
  font-weight: 600;
  flex: 1;
  color: var(--text);
}
.lb-score {
  font-size: 1.05rem;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--pink);
  text-shadow: 0 0 8px rgba(255,45,120,0.4);
}
.lb-unit {
  font-size: 0.68rem;
  margin-left: 2px;
  color: var(--text-muted);
  font-weight: 600;
}

/* ─── CHECK-IN FORM ──────────────────────────────────────────────────────────── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 24px 20px;
}
.card-title {
  font-size: 1.1rem; font-weight: 700;
  margin-bottom: 18px; color: var(--blue);
  text-shadow: 0 0 10px rgba(0,212,255,0.3);
}
.form-group {
  margin-bottom: 16px;
}
.label-row {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
}
label {
  display: block;
  font-size: 0.85rem; font-weight: 600;
  color: var(--text-muted);
}
.required {
  color: var(--pink); margin-left: 3px;
}
.char-counter {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

input[type="text"],
input[type="number"],
textarea,
select {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 0.92rem;
  font-family: inherit;
  transition: all 0.2s;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.15);
  background: rgba(255,255,255,0.08);
}
textarea {
  resize: vertical;
  min-height: 80px;
}
select {
  cursor: pointer;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  box-shadow: 0 4px 20px rgba(255,45,120,0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(255,45,120,0.5);
}
.btn-primary:active {
  transform: translateY(0);
}
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ─── SUCCESS / ERROR ────────────────────────────────────────────────────────── */
.message {
  padding: 16px;
  border-radius: 12px;
  font-size: 0.9rem;
  margin-bottom: 16px;
  display: none;
}
.message.show { display: block; }
.message.success {
  background: rgba(57,255,20,0.1);
  border: 1px solid rgba(57,255,20,0.3);
  color: var(--green-neon);
}
.message.error {
  background: rgba(255,45,120,0.1);
  border: 1px solid rgba(255,45,120,0.3);
  color: var(--pink);
}

/* ─── FOOTER ─────────────────────────────────────────────────────────────────── */
footer {
  margin-top: auto;
  text-align: center;
  padding: 20px;
  font-size: 0.75rem;
  color: var(--text-muted);
}
</style>
</head>
<body>

<nav>
  <div class="logo">Salford <span>HKers</span></div>
  <div class="nav-time" id="navTime">--:--:--</div>
  <a class="back-btn" href="index.html">← 返回主頁</a>
</nav>

<div class="page">
  <!-- LEADERBOARD -->
  <section class="leaderboard">
    <div class="lb-header">
      義工排行榜
      <span class="lb-month" id="lbMonth">正在載入...</span>
    </div>
    <ol class="lb-list" id="lbList">
      <li style="text-align:center; color:var(--text-muted); padding:20px;">
        載入中...
      </li>
    </ol>
  </section>

  <!-- CHECK-IN FORM -->
  <section class="card">
    <h2 class="card-title">簽到表格</h2>
    
    <div class="message" id="message"></div>

    <form id="checkinForm">
      <div class="form-group">
        <div class="label-row">
          <label>姓名 <span class="required">*</span></label>
        </div>
        <input type="text" id="name" name="name" required maxlength="50" />
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>參與活動 <span class="required">*</span></label>
        </div>
        <select id="event" name="event" required>
          <option value="">請選擇...</option>
          <option value="workshop">工作坊</option>
          <option value="community">社區服務</option>
          <option value="event-setup">活動籌備</option>
          <option value="admin">行政支援</option>
          <option value="other">其他</option>
        </select>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>服務時數 (小時) <span class="required">*</span></label>
        </div>
        <input type="number" id="hours" name="hours" required min="0.5" max="24" step="0.5" />
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>備註</label>
          <span class="char-counter"><span id="noteCount">0</span>/200</span>
        </div>
        <textarea id="notes" name="notes" maxlength="200" placeholder="任何補充說明 (可選)"></textarea>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        提交簽到
      </button>
    </form>
  </section>
</div>

<footer>
  © 2026 Salford Hongkongers · 義工管理系統
</footer>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════════
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxN__-ft7ZZ3bIYDRBPL6lsSG-UyzA5PRSQWDh_r1HhJBDhYoqrXnRgxDWIiCCVcfNnKA/exec';

// ═══════════════════════════════════════════════════════════════════════════════
// NAV TIME
// ═══════════════════════════════════════════════════════════════════════════════
function updateTime() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('navTime').textContent = `${hh}:${mm}:${ss}`;
}
setInterval(updateTime, 1000);
updateTime();

// ═══════════════════════════════════════════════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════════════════════════════════════════════
async function loadLeaderboard() {
  try {
    const resp = await fetch(`${SHEET_URL}?action=leaderboard`);
    if (!resp.ok) throw new Error('Network error');
    const data = await resp.json();

    // Month display
    const monthEl = document.getElementById('lbMonth');
    if (data.month) {
      monthEl.textContent = data.month;
    }

    // Render list (Code.gs returns top3, not leaderboard)
    const listEl = document.getElementById('lbList');
    const entries = data.top3 || data.leaderboard || [];
    if (entries.length === 0) {
      listEl.innerHTML = '<li style="text-align:center; color:var(--text-muted); padding:20px;">暫無記錄</li>';
      return;
    }

    const medals = ['gold', 'silver', 'bronze'];
    listEl.innerHTML = entries
      .map((item, i) => {
        const rank = i + 1;
        const cls = medals[i] || '';
        return `
          <li class="lb-item ${cls}">
            <div class="lb-rank">${rank}</div>
            <div class="lb-name">${escapeHtml(item.name)}</div>
            <div class="lb-score">${item.hours}<span class="lb-unit">h</span></div>
          </li>
        `;
      })
      .join('');
  } catch (err) {
    console.error('Failed to load leaderboard:', err);
    document.getElementById('lbList').innerHTML =
      '<li style="text-align:center; color:var(--pink); padding:20px;">載入失敗</li>';
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// FORM
// ═══════════════════════════════════════════════════════════════════════════════
const form = document.getElementById('checkinForm');
const messageEl = document.getElementById('message');
const submitBtn = document.getElementById('submitBtn');
const notesField = document.getElementById('notes');
const noteCounter = document.getElementById('noteCount');

// Character counter
notesField.addEventListener('input', () => {
  noteCounter.textContent = notesField.value.length;
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // Collect data
  const formData = new FormData(form);
  const payload = {
    action: 'checkin',
    name: formData.get('name').trim(),
    event: formData.get('event'),
    hours: parseFloat(formData.get('hours')),
    notes: formData.get('notes').trim()
  };

  // Validation
  if (!payload.name) {
    showMessage('請輸入姓名', 'error');
    return;
  }
  if (!payload.event) {
    showMessage('請選擇活動', 'error');
    return;
  }
  if (!payload.hours || payload.hours < 0.5) {
    showMessage('服務時數至少 0.5 小時', 'error');
    return;
  }

  // Submit
  submitBtn.disabled = true;
  submitBtn.textContent = '提交中...';

  try {
    const resp = await fetch(SHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!resp.ok) throw new Error('Server error');

    const result = await resp.json();
    if (result.status === 'success') {
      showMessage('✓ 簽到成功！感謝您的付出', 'success');
      form.reset();
      noteCounter.textContent = '0';
      // Reload leaderboard
      setTimeout(() => loadLeaderboard(), 500);
    } else {
      showMessage(result.message || '提交失敗', 'error');
    }
  } catch (err) {
    console.error('Submit error:', err);
    showMessage('網絡錯誤，請稍後再試', 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '提交簽到';
  }
});

function showMessage(text, type) {
  messageEl.textContent = text;
  messageEl.className = `message ${type} show`;
  setTimeout(() => messageEl.classList.remove('show'), 5000);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
loadLeaderboard();
</script>

</body>
</html>
