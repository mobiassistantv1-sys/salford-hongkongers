<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>義工打卡 — Salford Hongkongers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 480px;
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo img { height: 52px; object-fit: contain; }
    h1 { font-size: 1.4rem; color: #1a1a2e; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 28px; }

    /* Step indicators */
    .steps {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .step {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700;
      background: #eee; color: #aaa;
      transition: all 0.3s;
    }
    .step.active { background: #c0392b; color: #fff; }
    .step.done   { background: #27ae60; color: #fff; }
    .step-line { flex: 1; height: 2px; background: #eee; align-self: center; max-width: 40px; }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }

    /* Autocomplete */
    .autocomplete-wrap { position: relative; }
    input[type="text"], input[type="tel"], input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #c0392b; }
    .dropdown {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: #fff;
      border: 1.5px solid #ddd;
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.95rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .dropdown-item:hover, .dropdown-item.selected { background: #fdeeea; }
    .dropdown-item:last-child { border-bottom: none; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-primary { background: #c0392b; color: #fff; }
    .btn-primary:hover { background: #a0301f; }
    .btn-secondary { background: #ecf0f1; color: #555; }
    .btn-secondary:hover { background: #d5dbdc; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-group { display: flex; gap: 12px; margin-top: 20px; }
    .btn-group .btn { flex: 1; }

    .summary { margin-bottom: 24px; line-height: 1.9; }
    .summary-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .summary-label { font-weight: 600; color: #555; }
    .summary-value { color: #1a1a2e; font-weight: 500; }

    .success-icon { text-align: center; font-size: 4rem; margin-bottom: 16px; }
    .success-msg { text-align: center; color: #27ae60; font-size: 1.2rem; font-weight: 600; margin-bottom: 12px; }
    .success-detail { text-align: center; color: #666; font-size: 0.9rem; line-height: 1.6; }

    .error { color: #c0392b; font-size: 0.82rem; margin-top: 8px; display: none; }
    .loading { display: none; text-align: center; padding: 24px; color: #666; }

    @media (max-width: 500px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <img src="assets/logo-landscape.svg" alt="Salford Hongkongers">
  </div>
  <h1>義工打卡</h1>
  <p class="subtitle">Volunteer Check-in</p>

  <!-- Step Indicators -->
  <div class="steps">
    <div class="step active" id="step1">1</div>
    <div class="step-line"></div>
    <div class="step" id="step2">2</div>
    <div class="step-line"></div>
    <div class="step" id="step3">3</div>
  </div>

  <!-- Panel 1: Name + Event -->
  <div class="panel active" id="panel1">
    <div class="form-group">
      <label for="name">你個名 / Your Name</label>
      <div class="autocomplete-wrap">
        <input type="text" id="name" placeholder="例如: 陳大文" autocomplete="off">
        <div class="dropdown" id="name-dropdown"></div>
      </div>
    </div>

    <div class="form-group">
      <label for="event">活動 / Event</label>
      <div class="autocomplete-wrap">
        <input type="text" id="event" placeholder="例如: 社區巡邏" autocomplete="off">
        <div class="dropdown" id="event-dropdown"></div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="goStep2()">下一步 Next</button>
    <div class="error" id="error1"></div>
  </div>

  <!-- Panel 2: Hours + Date -->
  <div class="panel" id="panel2">
    <div class="form-group">
      <label for="hours">做咗幾多個鐘 / Hours Served</label>
      <input type="text" id="hours" placeholder="例如: 2 或 2.5" inputmode="decimal">
    </div>

    <div class="form-group">
      <label for="date">邊日做嘅 / Date</label>
      <input type="date" id="date">
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" onclick="goStep1()">返上步 Back</button>
      <button class="btn btn-primary" onclick="goStep3()">下一步 Next</button>
    </div>
    <div class="error" id="error2"></div>
  </div>

  <!-- Panel 3: Confirm -->
  <div class="panel" id="panel3">
    <div class="summary">
      <div class="summary-item">
        <span class="summary-label">名</span>
        <span class="summary-value" id="sum-name"></span>
      </div>
      <div class="summary-item">
        <span class="summary-label">活動</span>
        <span class="summary-value" id="sum-event"></span>
      </div>
      <div class="summary-item">
        <span class="summary-label">時數</span>
        <span class="summary-value" id="sum-hours"></span>
      </div>
      <div class="summary-item">
        <span class="summary-label">日期</span>
        <span class="summary-value" id="sum-date"></span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" onclick="goStep2()">返上步 Back</button>
      <button class="btn btn-primary" onclick="submitCheckin()">確認送出 Submit</button>
    </div>
    <div class="error" id="error3"></div>
  </div>

  <!-- Panel 4: Success -->
  <div class="panel" id="panel4">
    <div class="success-icon">✓</div>
    <div class="success-msg">打卡成功！</div>
    <div class="success-detail">
      已成功記錄你嘅義工時數<br>
      多謝你嘅付出！<br>
      <br>
      <strong>Check-in Success!</strong><br>
      Your volunteer hours have been recorded.<br>
      Thank you for your contribution!
    </div>
    <button class="btn btn-primary" onclick="reset()" style="margin-top: 28px;">再打卡 Check-in Again</button>
  </div>

  <div class="loading" id="loading">提交中... Submitting...</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyU6W8W3vm5R7TGd4A9t2qD3NZp5NI3PaXyptlBiiJawL_SK7LcZqfkX1v4wU-nenw/exec';

let volunteers = [];
let events = [];

// Load data
async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    volunteers = data.volunteers || [];
    events = data.events || [];
  } catch (err) {
    console.error('Failed to load data:', err);
  }
}
loadData();

// Autocomplete
function setupAutocomplete(inputId, dropdownId, dataArray) {
  const input = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);

  input.addEventListener('input', () => {
    const val = input.value.trim().toLowerCase();
    dropdown.innerHTML = '';
    if (!val) {
      dropdown.style.display = 'none';
      return;
    }
    const matches = dataArray.filter(item => item.toLowerCase().includes(val));
    if (matches.length === 0) {
      dropdown.style.display = 'none';
      return;
    }
    matches.forEach(item => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.textContent = item;
      div.onclick = () => {
        input.value = item;
        dropdown.style.display = 'none';
      };
      dropdown.appendChild(div);
    });
    dropdown.style.display = 'block';
  });

  input.addEventListener('focus', () => {
    if (input.value.trim()) input.dispatchEvent(new Event('input'));
  });

  document.addEventListener('click', (e) => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });
}

setupAutocomplete('name', 'name-dropdown', volunteers);
setupAutocomplete('event', 'event-dropdown', events);

// Steps
function goStep1() { switchPanel(1); }
function goStep2() {
  const name = document.getElementById('name').value.trim();
  const event = document.getElementById('event').value.trim();
  const err = document.getElementById('error1');
  if (!name || !event) {
    err.textContent = '請填齊所有資料 / Please fill all fields';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';

  // Set today's date as default
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('date').value = today;

  switchPanel(2);
}
function goStep3() {
  const hours = document.getElementById('hours').value.trim();
  const date = document.getElementById('date').value;
  const err = document.getElementById('error2');
  if (!hours || !date) {
    err.textContent = '請填齊所有資料 / Please fill all fields';
    err.style.display = 'block';
    return;
  }
  const h = parseFloat(hours);
  if (isNaN(h) || h <= 0) {
    err.textContent = '請輸入有效時數 / Please enter valid hours';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';

  // Update summary
  document.getElementById('sum-name').textContent = document.getElementById('name').value;
  document.getElementById('sum-event').textContent = document.getElementById('event').value;
  document.getElementById('sum-hours').textContent = hours;
  document.getElementById('sum-date').textContent = date;

  switchPanel(3);
}

function switchPanel(n) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel' + n).classList.add('active');

  document.querySelectorAll('.step').forEach(s => s.classList.remove('active', 'done'));
  for (let i = 1; i < n; i++) {
    document.getElementById('step' + i).classList.add('done');
  }
  document.getElementById('step' + n).classList.add('active');
}

async function submitCheckin() {
  const name = document.getElementById('name').value.trim();
  const event = document.getElementById('event').value.trim();
  const hours = document.getElementById('hours').value.trim();
  const date = document.getElementById('date').value;

  const err = document.getElementById('error3');
  const loading = document.getElementById('loading');

  loading.style.display = 'block';
  document.getElementById('panel3').style.display = 'none';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        action: 'checkin',
        name, event, hours, date
      })
    });
    const result = await res.json();
    loading.style.display = 'none';

    if (result.success) {
      switchPanel(4);
    } else {
      document.getElementById('panel3').style.display = 'block';
      err.textContent = '提交失敗，請重試 / Submission failed, please retry';
      err.style.display = 'block';
    }
  } catch (error) {
    loading.style.display = 'none';
    document.getElementById('panel3').style.display = 'block';
    err.textContent = '網絡錯誤，請重試 / Network error, please retry';
    err.style.display = 'block';
  }
}

function reset() {
  document.getElementById('name').value = '';
  document.getElementById('event').value = '';
  document.getElementById('hours').value = '';
  document.getElementById('date').value = '';
  switchPanel(1);
}
</script>

</body>
</html>
