<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>義工頁面 | Salford Hongkongers</title>
<style>
:root {
  --pink: #ff2d78;
  --blue: #00d4ff;
  --purple: #b44fff;
  --green-neon: #39ff14;
  --gold: #ffd700;
  --silver: #c0c0c0;
  --bronze: #cd7f32;
  --bg: #0a0a0f;
  --card-bg: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.1);
  --text: #f0f0f0;
  --text-muted: rgba(255,255,255,0.45);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(255,45,120,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.08) 0%, transparent 50%);
}

/* NAV */
nav {
  background: rgba(10,10,15,0.95);
  border-bottom: 1px solid rgba(255,45,120,0.3);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}
nav .logo { color: #fff; font-size: 1rem; font-weight: 800; letter-spacing: -0.3px; }
nav .logo span { color: var(--pink); text-shadow: 0 0 10px var(--pink); }
nav .nav-time {
  color: var(--blue); font-size: 0.88rem;
  font-variant-numeric: tabular-nums; font-weight: 700;
  text-shadow: 0 0 8px var(--blue);
}
nav .back-btn {
  color: var(--text-muted); font-size: 0.85rem;
  text-decoration: none; display: flex; align-items: center; gap: 4px;
  transition: color 0.2s;
}
nav .back-btn:hover { color: var(--pink); }

/* LAYOUT */
.page {
  display: flex; flex-direction: column; gap: 16px;
  padding: 20px 16px 40px;
  max-width: 480px; margin: 0 auto; width: 100%;
}

/* ┌── LEADERBOARD ─────────────────────────────────────────┐ */
.leaderboard {
  background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(180,79,255,0.08));
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: var(--radius);
  padding: 20px 18px 18px;
  box-shadow: 0 0 20px rgba(255,215,0,0.08);
}
.lb-header {
  text-align: center;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 10px rgba(255,215,0,0.6);
  margin-bottom: 16px;
}
.lb-month {
  display: block;
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  margin-top: 3px;
  text-transform: none;
  font-weight: 500;
}
.lb-list {
  display: flex; flex-direction: column; gap: 10px;
  list-style: none;
}
.lb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  transition: transform 0.2s, box-shadow 0.2s;
}
.lb-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,215,0,0.12);
}
.lb-item.top-1 {
  background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.05));
  border-color: var(--gold);
  box-shadow: 0 0 14px rgba(255,215,0,0.15);
}
.lb-item.top-2 {
  background: linear-gradient(135deg, rgba(192,192,192,0.1), rgba(192,192,192,0.03));
  border-color: var(--silver);
}
.lb-item.top-3 {
  background: linear-gradient(135deg, rgba(205,127,50,0.1), rgba(205,127,50,0.03));
  border-color: var(--bronze);
}

.lb-rank {
  font-size: 1.3rem; font-weight: 900; width: 40px;
  text-align: center; line-height: 1;
  flex-shrink: 0;
}
.lb-item.top-1 .lb-rank {
  color: var(--gold);
  text-shadow: 0 0 8px var(--gold), 0 0 14px rgba(255,215,0,0.4);
  filter: drop-shadow(0 2px 4px rgba(255,215,0,0.3));
}
.lb-item.top-2 .lb-rank {
  color: var(--silver);
  text-shadow: 0 0 8px var(--silver);
}
.lb-item.top-3 .lb-rank {
  color: var(--bronze);
  text-shadow: 0 0 8px var(--bronze);
}
.lb-rank-badge {
  font-size: 1.6rem;
  display: inline-block;
  filter: drop-shadow(0 2px 6px rgba(255,215,0,0.5));
}

.lb-name {
  flex: 1;
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text);
  letter-spacing: -0.2px;
}
.lb-item.top-1 .lb-name { color: var(--gold); font-weight: 700; }
.lb-item.top-2 .lb-name { color: var(--silver); font-weight: 700; }
.lb-item.top-3 .lb-name { color: var(--bronze); font-weight: 700; }

.lb-score {
  font-weight: 800;
  font-size: 1.1rem;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.lb-score-num { font-size: 1.25rem; }
.lb-score-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.lb-item.top-1 .lb-score { color: var(--gold); }
.lb-item.top-2 .lb-score { color: var(--silver); }
.lb-item.top-3 .lb-score { color: var(--bronze); }

/* ┌── CHECK-IN CARD ─────────────────────────────────────┐ */
.checkin-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 22px 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.checkin-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  margin-bottom: 18px;
  letter-spacing: -0.3px;
}
.checkin-title .emoji { font-size: 1.3rem; margin-right: 6px; }

.input-group {
  display: flex; flex-direction: column; gap: 7px;
  margin-bottom: 16px;
}
label {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}
input, select {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  transition: all 0.2s;
  font-family: inherit;
}
input:focus, select:focus {
  background: rgba(255,255,255,0.12);
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(255,45,120,0.15);
}
select option {
  background: #1a1a1f;
  color: #fff;
}

.btn-primary {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  padding: 14px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  width: 100%;
  margin-top: 8px;
  letter-spacing: 0.5px;
  transition: all 0.3s;
  box-shadow: 0 4px 12px rgba(255,45,120,0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,45,120,0.5);
}
.btn-primary:active {
  transform: translateY(0);
}
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ┌── HISTORY LOG ─────────────────────────────────────┐ */
.history-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 20px 18px;
}
.history-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
  letter-spacing: -0.2px;
}
.history-list {
  display: flex; flex-direction: column; gap: 10px;
  list-style: none;
  max-height: 320px;
  overflow-y: auto;
}
.history-item {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.2s;
}
.history-item:hover {
  background: rgba(255,255,255,0.07);
}
.history-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.history-name {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text);
}
.history-type {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 500;
}
.history-time {
  font-size: 0.75rem;
  color: var(--blue);
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  text-align: right;
  text-shadow: 0 0 6px rgba(0,212,255,0.4);
}

/* ┌── TOAST NOTIFICATION ──────────────────────────────┐ */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  padding: 14px 24px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 0.9rem;
  box-shadow: 0 6px 24px rgba(255,45,120,0.4);
  z-index: 999;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  pointer-events: none;
  max-width: 90%;
  text-align: center;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
</style>
</head>
<body>

<nav>
  <a class="back-btn" href="index.html">
    <span>←</span> 返回主頁
  </a>
  <div class="logo">Salford<span>HK</span></div>
  <div class="nav-time" id="nav-time">00:00</div>
</nav>

<div class="page">
  <!-- ┌── LEADERBOARD ──────────────────────────────┐ -->
  <div class="leaderboard">
    <div class="lb-header">
      🏆 義工王者榜 🏆
      <span class="lb-month" id="lb-month">本月數據</span>
    </div>
    <ul class="lb-list" id="lb-list">
      <!-- populated by JS -->
    </ul>
  </div>

  <!-- ┌── CHECK-IN CARD ────────────────────────────┐ -->
  <div class="checkin-card">
    <div class="checkin-title">
      <span class="emoji">✅</span>
      義工頁面
    </div>
    <form id="checkin-form">
      <div class="input-group">
        <label for="name">姓名</label>
        <input id="name" name="name" placeholder="請輸入你的名字" required="" type="text"/>
      </div>
      <div class="input-group">
        <label for="type">堂吉類別</label>
        <select id="type" name="type" required="">
          <option value="">請選擇義工活動類型</option>
          <option value="活動義工">活動義工 (Event Volunteer)</option>
          <option value="網站維護">網站維護 (Website Maintenance)</option>
          <option value="社群管理">社群管理 (Community Management)</option>
          <option value="內容創作">內容創作 (Content Creation)</option>
          <option value="活動策劃">活動策劃 (Event Planning)</option>
          <option value="其他">其他 (Other)</option>
        </select>
      </div>
      <button class="btn-primary" type="submit">
        提交堂吉
      </button>
    </form>
  </div>

  <!-- ┌── HISTORY LOG ──────────────────────────────┐ -->
  <div class="history-card">
    <div class="history-title">📋 最近堂吉記錄</div>
    <ul class="history-list" id="history-list">
      <!-- populated by JS -->
    </ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ┌────────────────────────────────────────────────────────────────┐
// │ CONFIG                                                         │
// └────────────────────────────────────────────────────────────────┘
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzcNCWdXG0qh15qgLohEu18Z3VGwJuZ2RYZSDSuNdRXcuP1-t_8Y23bM-F_esFSKk_h/exec';
const CACHE_KEY_HISTORY = 'shk_volunteer_history';
const CACHE_KEY_LEADERBOARD = 'shk_volunteer_leaderboard';
const CACHE_TTL = 5 * 60 * 1000; // 5 min

// ┌────────────────────────────────────────────────────────────────┐
// │ CLOCK                                                          │
// └────────────────────────────────────────────────────────────────┘
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('nav-time').textContent = `${hh}:${mm}`;
}
setInterval(updateClock, 1000);
updateClock();

// ┌────────────────────────────────────────────────────────────────┐
// │ MONTH DISPLAY                                                  │
// └────────────────────────────────────────────────────────────────┘
function updateMonthDisplay() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  document.getElementById('lb-month').textContent = `${year}年${month}月數據`;
}
updateMonthDisplay();

// ┌────────────────────────────────────────────────────────────────┐
// │ CACHE HELPERS                                                  │
// └────────────────────────────────────────────────────────────────┘
function getCache(key) {
  try {
    const item = localStorage.getItem(key);
    if (!item) return null;
    const parsed = JSON.parse(item);
    if (Date.now() > parsed.expiry) {
      localStorage.removeItem(key);
      return null;
    }
    return parsed.data;
  } catch {
    return null;
  }
}

function setCache(key, data) {
  try {
    const item = {
      data: data,
      expiry: Date.now() + CACHE_TTL
    };
    localStorage.setItem(key, JSON.stringify(item));
  } catch (e) {
    console.warn('Cache write failed:', e);
  }
}

// ┌────────────────────────────────────────────────────────────────┐
// │ TOAST                                                          │
// └────────────────────────────────────────────────────────────────┘
function showToast(message, duration = 3000) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, duration);
}

// ┌────────────────────────────────────────────────────────────────┐
// │ LEADERBOARD RENDER                                             │
// └────────────────────────────────────────────────────────────────┘
function renderLeaderboard(data) {
  const list = document.getElementById('lb-list');
  list.innerHTML = '';

  if (!data || data.length === 0) {
    list.innerHTML = '<li style="text-align:center;color:var(--text-muted);padding:20px;">暫無數據</li>';
    return;
  }

  // Sort by count descending
  const sorted = [...data].sort((a, b) => b.count - a.count);

  sorted.forEach((item, idx) => {
    const rank = idx + 1;
    const li = document.createElement('li');
    li.className = 'lb-item';
    if (rank === 1) li.classList.add('top-1');
    if (rank === 2) li.classList.add('top-2');
    if (rank === 3) li.classList.add('top-3');

    let rankDisplay = `${rank}`;
    if (rank === 1) rankDisplay = '<span class="lb-rank-badge">🥇</span>';
    if (rank === 2) rankDisplay = '<span class="lb-rank-badge">🥈</span>';
    if (rank === 3) rankDisplay = '<span class="lb-rank-badge">🥉</span>';

    li.innerHTML = `
      <div class="lb-rank">${rankDisplay}</div>
      <div class="lb-name">${escapeHtml(item.name)}</div>
      <div class="lb-score">
        <span class="lb-score-num">${item.count}</span>
        <span class="lb-score-label">次</span>
      </div>
    `;
    list.appendChild(li);
  });
}

// ┌────────────────────────────────────────────────────────────────┐
// │ HISTORY RENDER                                                 │
// └────────────────────────────────────────────────────────────────┘
function renderHistory(data) {
  const list = document.getElementById('history-list');
  list.innerHTML = '';

  if (!data || data.length === 0) {
    list.innerHTML = '<li style="text-align:center;color:var(--text-muted);padding:20px;">暫無記錄</li>';
    return;
  }

  // Show latest 20
  const recent = data.slice(0, 20);
  recent.forEach(item => {
    const li = document.createElement('li');
    li.className = 'history-item';
    li.innerHTML = `
      <div class="history-info">
        <div class="history-name">${escapeHtml(item.name)}</div>
        <div class="history-type">${escapeHtml(item.type)}</div>
      </div>
      <div class="history-time">${escapeHtml(item.timestamp)}</div>
    `;
    list.appendChild(li);
  });
}

// ┌────────────────────────────────────────────────────────────────┐
// │ FETCH LEADERBOARD                                              │
// └────────────────────────────────────────────────────────────────┘
async function fetchLeaderboard() {
  const cached = getCache(CACHE_KEY_LEADERBOARD);
  if (cached) {
    renderLeaderboard(cached);
    return;
  }

  try {
    const res = await fetch(`${SHEET_URL}?action=leaderboard&t=${Date.now()}`);
    const json = await res.json();
    if (json.status === 'success' && json.data) {
      setCache(CACHE_KEY_LEADERBOARD, json.data);
      renderLeaderboard(json.data);
    } else {
      console.error('Leaderboard fetch error:', json.message);
    }
  } catch (err) {
    console.error('Leaderboard fetch failed:', err);
  }
}

// ┌────────────────────────────────────────────────────────────────┐
// │ FETCH HISTORY                                                  │
// └────────────────────────────────────────────────────────────────┘
async function fetchHistory() {
  const cached = getCache(CACHE_KEY_HISTORY);
  if (cached) {
    renderHistory(cached);
    return;
  }

  try {
    const res = await fetch(`${SHEET_URL}?action=history&t=${Date.now()}`);
    const json = await res.json();
    if (json.status === 'success' && json.data) {
      setCache(CACHE_KEY_HISTORY, json.data);
      renderHistory(json.data);
    } else {
      console.error('History fetch error:', json.message);
    }
  } catch (err) {
    console.error('History fetch failed:', err);
  }
}

// ┌────────────────────────────────────────────────────────────────┐
// │ SUBMIT CHECK-IN                                                │
// └────────────────────────────────────────────────────────────────┘
document.getElementById('checkin-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  const name = document.getElementById('name').value.trim();
  const type = document.getElementById('type').value.trim();

  if (!name || !type) {
    showToast('請填寫所有欄位');
    return;
  }

  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    const res = await fetch(SHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        action: 'checkin',
        name: name,
        type: type,
        timestamp: new Date().toLocaleString('zh-HK', { timeZone: 'Europe/London', hour12: false })
      })
    });
    const json = await res.json();

    if (json.status === 'success') {
      showToast('✅ 堂吉成功！');
      document.getElementById('checkin-form').reset();

      // Clear cache and refresh
      localStorage.removeItem(CACHE_KEY_HISTORY);
      localStorage.removeItem(CACHE_KEY_LEADERBOARD);
      setTimeout(() => {
        fetchHistory();
        fetchLeaderboard();
      }, 500);
    } else {
      showToast('❌ ' + (json.message || '提交失敗'));
    }
  } catch (err) {
    console.error('Checkin submit error:', err);
    showToast('❌ 網絡錯誤，請重試');
  } finally {
    btn.disabled = false;
    btn.textContent = '提交堂吉';
  }
});

// ┌────────────────────────────────────────────────────────────────┐
// │ ESCAPE HTML (prevent XSS)                                      │
// └────────────────────────────────────────────────────────────────┘
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ┌────────────────────────────────────────────────────────────────┐
// │ INIT                                                           │
// └────────────────────────────────────────────────────────────────┘
fetchHistory();
fetchLeaderboard();
</script>

</body>
</html>
