<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e91e8c" />
  <title>義工打卡 | Salford Hongkongers</title>
  <style>
    /* ===== RESET & BASE ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:        #e91e8c;
      --pink-dark:   #c2185b;
      --pink-glow:   rgba(233,30,140,0.35);
      --pink-light:  rgba(233,30,140,0.12);
      --neon-pink:   #ff2d78;
      --neon-blue:   #00d4ff;
      --dark:        #0a0a0a;
      --dark-2:      #0e0e1a;
      --dark-3:      #131325;
      --text:        #eef0f8;
      --text-muted:  rgba(220,225,245,0.52);
      --glass-bg:    rgba(255,255,255,0.05);
      --glass-border:rgba(255,255,255,0.10);
      --card-shadow: 0 8px 36px rgba(0,0,0,0.55);
      --glow-pink:   0 0 8px #ff2d78, 0 0 20px rgba(255,45,120,0.5);
      --header-h:    64px;
      --bottom-nav-h:72px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'PingFang HK',
                   'Hiragino Sans GB', 'Noto Sans HK', Arial, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== GLOBAL NEON BG ===== */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(255,45,120,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 55% 40% at 88% 85%, rgba(0,212,255,0.14)  0%, transparent 50%),
        radial-gradient(ellipse 45% 35% at 55% 48%, rgba(191,95,255,0.10) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
      pointer-events: none; z-index: 0;
    }
    body > * { position: relative; z-index: 1; }

    /* ===== HEADER ===== */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 100;
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 100%; padding: 0 20px;
    }
    .header-logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-circle {
      width: 40px; height: 40px;
      background: #0a0a0a;
      border: 2px solid var(--neon-pink);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 11px;
      color: var(--neon-pink);
      letter-spacing: 0.5px; flex-shrink: 0;
      box-shadow: var(--glow-pink);
      text-shadow: var(--glow-pink);
    }
    .site-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .site-subtitle { font-size: 10px; color: var(--text-muted); letter-spacing: 0.3px; }
    .header-badge {
      background: var(--pink-light);
      border: 1px solid rgba(233,30,140,0.4);
      color: var(--pink);
      font-size: 11px; font-weight: 700;
      padding: 4px 12px; border-radius: 50px;
      letter-spacing: 0.5px;
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--bottom-nav-h);
      background: rgba(15,15,26,0.88);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      display: flex;
      border-top: 1px solid rgba(255,45,120,0.3);
      box-shadow: 0 -4px 20px rgba(255,45,120,0.08);
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bottom-btn {
      flex: 1; background: none; border: none;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; color: var(--text-muted);
      transition: color 0.2s; padding: 8px 4px;
    }
    .bottom-btn.active { color: #ff2d78; text-shadow: 0 0 8px rgba(255,45,120,0.8); }
    .bottom-icon { font-size: 20px; line-height: 1; }
    .neon-icon svg { display: block; }
    .bottom-label { font-size: 10px; font-weight: 600; letter-spacing: 0.2px; }

    /* ===== MAIN CONTENT ===== */
    .main {
      margin-top: var(--header-h);
      margin-bottom: var(--bottom-nav-h);
      padding: 24px 16px;
      display: flex; flex-direction: column; align-items: center;
      min-height: calc(100vh - var(--header-h) - var(--bottom-nav-h));
      justify-content: center;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(233,30,140,0.2);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%; max-width: 420px;
      box-shadow: var(--card-shadow), 0 0 40px rgba(233,30,140,0.06);
    }

    /* ===== STEP INDICATOR ===== */
    .step-indicator {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 28px;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.2); transition: all 0.3s;
    }
    .step-dot.active { background: var(--pink); transform: scale(1.4); box-shadow: 0 0 8px var(--pink-glow); }
    .step-dot.done { background: #39ff14; }

    .step { display: none; }
    .step.active { display: block; }

    h2 { color: #fff; font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: rgba(233,30,140,0.8); font-size: 0.85rem; margin-bottom: 24px; }

    label {
      display: block; color: var(--text-muted);
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.5px; margin-bottom: 6px; text-transform: uppercase;
    }

    input[type="text"], input[type="tel"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 12px 14px;
      color: #fff; font-size: 1rem; outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      margin-bottom: 18px;
    }
    input[type="text"]:focus, input[type="tel"]:focus {
      border-color: var(--pink);
      background: var(--pink-light);
      box-shadow: 0 0 12px rgba(233,30,140,0.2);
    }
    input::placeholder { color: rgba(255,255,255,0.25); }

    /* ===== AUTOCOMPLETE ===== */
    .autocomplete-wrapper { position: relative; margin-bottom: 18px; }
    .autocomplete-wrapper input { margin-bottom: 0; }
    .autocomplete-list {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #0d0d0d;
      border: 1px solid rgba(233,30,140,0.3);
      border-top: none;
      border-radius: 0 0 10px 10px;
      max-height: 200px; overflow-y: auto;
      z-index: 100; display: none;
    }
    .autocomplete-list.open { display: block; }
    .autocomplete-item {
      padding: 10px 14px; color: var(--text);
      font-size: 0.9rem; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }
    .autocomplete-item:hover,
    .autocomplete-item.selected { background: var(--pink-light); color: var(--pink); }

    /* ===== VERIFY RESULT ===== */
    .verify-result {
      border-radius: 10px; padding: 12px 16px;
      margin-bottom: 20px; font-size: 0.9rem; display: none;
    }
    .verify-result.success {
      display: flex; align-items: center; gap: 10px;
      background: rgba(57,255,20,0.1);
      border: 1px solid rgba(57,255,20,0.35);
      color: #a8ff87;
    }
    .verify-result.error {
      display: flex; align-items: center; gap: 10px;
      background: rgba(239,83,80,0.12);
      border: 1px solid rgba(239,83,80,0.35);
      color: #ef9a9a;
    }
    .verify-icon { font-size: 1.3rem; }

    /* ===== BUTTONS ===== */
    .btn {
      width: 100%; border: none; border-radius: 12px;
      padding: 14px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.25s; letter-spacing: 0.5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: #fff;
      box-shadow: 0 4px 20px var(--pink-glow);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(233,30,140,0.55);
    }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-punch-in {
      background: linear-gradient(135deg, #39ff14, #00c853);
      color: #000; font-weight: 900;
      box-shadow: 0 4px 20px rgba(57,255,20,0.3);
      font-size: 1.2rem; padding: 18px; letter-spacing: 2px;
    }
    .btn-punch-in:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(57,255,20,0.5);
    }
    .btn-punch-out {
      background: linear-gradient(135deg, var(--pink), #ff6600);
      color: #fff; font-weight: 900;
      box-shadow: 0 4px 20px var(--pink-glow);
      font-size: 1.2rem; padding: 18px; letter-spacing: 2px;
    }
    .btn-punch-out:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(233,30,140,0.55);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
      margin-top: 10px; font-size: 0.9rem;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.10); color: #fff; }

    /* ===== VOLUNTEER INFO CARD ===== */
    .volunteer-info-card {
      background: var(--pink-light);
      border: 1px solid rgba(233,30,140,0.3);
      border-radius: 12px; padding: 16px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 14px;
    }
    .volunteer-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 700; color: #fff; flex-shrink: 0;
      box-shadow: 0 0 16px var(--pink-glow);
    }
    .volunteer-name { color: #fff; font-size: 1rem; font-weight: 700; }
    .volunteer-num { color: var(--pink); font-size: 0.8rem; margin-top: 2px; }

    /* ===== PUNCH STATUS ===== */
    .punch-status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px;
      font-size: 0.8rem; font-weight: 600; margin-bottom: 20px;
    }
    .badge-not-in {
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
    }
    .badge-in {
      background: rgba(57,255,20,0.1);
      color: #a8ff87;
      border: 1px solid rgba(57,255,20,0.3);
    }
    .badge-dot { width: 8px; height: 8px; border-radius: 50%; }
    .badge-not-in .badge-dot { background: #607d8b; }
    .badge-in .badge-dot { background: #39ff14; animation: pulse 1.5s infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .checkin-time-display {
      background: var(--glass-bg);
      border: 1px solid rgba(233,30,140,0.15);
      border-radius: 10px; padding: 12px 16px;
      margin-bottom: 20px; font-size: 0.85rem; color: var(--text-muted);
    }
    .checkin-time-display span { color: #fff; font-weight: 600; }

    /* ===== SUCCESS ===== */
    .success-icon { font-size: 4rem; text-align: center; margin-bottom: 16px; }
    .success-msg { color: #fff; font-size: 1.1rem; text-align: center; font-weight: 700; margin-bottom: 8px; }
    .success-sub { color: rgba(233,30,140,0.8); font-size: 0.85rem; text-align: center; margin-bottom: 24px; line-height: 1.6; }
    .success-detail {
      background: var(--glass-bg);
      border: 1px solid rgba(233,30,140,0.15);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 20px;
    }
    .success-detail-row {
      display: flex; justify-content: space-between;
      color: var(--text-muted); font-size: 0.85rem; padding: 4px 0;
    }
    .success-detail-row span:last-child { color: #fff; font-weight: 600; }

    /* ===== LOADING SPINNER ===== */
    .loading-spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-inner">
    <div class="header-logo-area">
      <div class="logo-circle">SHK</div>
      <div>
        <div class="site-title">Salford Hongkongers</div>
        <div class="site-subtitle">CIC</div>
      </div>
    </div>
    <div class="header-badge">義工打卡</div>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main class="main">
  <div class="card">
    <div class="step-indicator">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>

    <!-- STEP 1: 輸入姓名 + 電話尾4位 -->
    <div class="step active" id="step1">
      <h2>身份核對</h2>
      <p class="subtitle">請輸入你的義工姓名及電話尾4位</p>

      <label>義工姓名</label>
      <div class="autocomplete-wrapper">
        <input type="text" id="nameInput" placeholder="輸入姓名搜尋..." autocomplete="off"
          oninput="onNameInput()" onkeydown="onNameKeydown(event)" />
        <div class="autocomplete-list" id="autocompleteList"></div>
      </div>

      <label>電話尾 4 位</label>
      <input type="tel" id="phoneInput" placeholder="例如：3857" maxlength="4" pattern="[0-9]{4}"
        oninput="this.value=this.value.replace(/\D/g,'').slice(0,4)" />

      <div class="verify-result" id="verifyResult">
        <span class="verify-icon" id="verifyIcon"></span>
        <span id="verifyMsg"></span>
      </div>

      <button class="btn btn-primary" id="verifyBtn" onclick="verifyIdentity()">核對身份</button>
    </div>

    <!-- STEP 2: 打卡 -->
    <div class="step" id="step2">
      <h2>義工打卡</h2>
      <p class="subtitle" id="step2Date"></p>

      <div class="volunteer-info-card">
        <div class="volunteer-avatar" id="avatarInitial">?</div>
        <div>
          <div class="volunteer-name" id="confirmedName"></div>
          <div class="volunteer-num" id="confirmedNum"></div>
        </div>
      </div>

      <div id="punchStatusBadge"></div>
      <div id="checkinTimeDisplay"></div>

      <button class="btn btn-punch-in" id="punchBtn" onclick="doPunch()">PUNCH</button>
      <button class="btn btn-secondary" onclick="resetToStep1()">返回 / 換人</button>
    </div>

    <!-- STEP 3: 成功 -->
    <div class="step" id="step3">
      <div class="success-icon" id="successIcon">✅</div>
      <div class="success-msg" id="successMsg">打卡成功！</div>
      <div class="success-sub" id="successSub"></div>
      <div class="success-detail" id="successDetail"></div>
      <button class="btn btn-primary" onclick="resetToStep1()">完成 / 下一位</button>
    </div>
  </div>
</main>

<!-- ===== BOTTOM NAV ===== -->
<nav class="bottom-nav">
  <button class="bottom-btn" onclick="location.href='index.html'">
    <span class="bottom-icon"><span class="neon-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff2d78" stroke-width="1.8">
        <path d="M3 12L12 3l9 9"/><path d="M5 10v9a1 1 0 001 1h4v-4h4v4h4a1 1 0 001-1v-9"/>
      </svg>
    </span></span>
    <span class="bottom-label">主頁</span>
  </button>
  <button class="bottom-btn" onclick="location.href='index.html#events'">
    <span class="bottom-icon"><span class="neon-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.8">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </span></span>
    <span class="bottom-label">活動</span>
  </button>
  <button class="bottom-btn active">
    <span class="bottom-icon"><span class="neon-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff2d78" stroke-width="1.8">
        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/>
      </svg>
    </span></span>
    <span class="bottom-label">義工</span>
  </button>
  <button class="bottom-btn" onclick="location.href='volunteer-register.html'">
    <span class="bottom-icon"><span class="neon-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff2d78" stroke-width="1.8">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
      </svg>
    </span></span>
    <span class="bottom-label">登記</span>
  </button>
  <button class="bottom-btn" onclick="location.href='forms.html'">
    <span class="bottom-icon"><span class="neon-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.8">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
    </span></span>
    <span class="bottom-label">表格</span>
  </button>
</nav>

<script>
// ============================================================
// CONFIG
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5XghDdEBG41krkKoD5-860RptJozTLAb6yX4p_k7UIyDR1xdiZlmFLBi9ZXlKhMtU/exec';

// Volunteer data loaded from Google Sheets (via Apps Script)
// Format: { name: string, phone_last4: string, rowIndex: number }
let volunteerData = [];
let selectedVolunteer = null;
let currentPunchState = null; // null = not punched in, { time, rowIndex } = punched in

// ============================================================
// INIT
// ============================================================
window.onload = function() {
  updateStep2Date();
  loadVolunteerData();
};

function updateStep2Date() {
  const now = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('step2Date').textContent = now.toLocaleDateString('zh-Hant-HK', opts);
}

async function loadVolunteerData() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getVolunteers');
    const json = await res.json();
    if (json.volunteers) {
      volunteerData = json.volunteers;
    }
  } catch(e) {
    // Fallback: will show error on verify
    console.warn('Could not load volunteer data:', e);
  }
}

// ============================================================
// AUTOCOMPLETE
// ============================================================
let acSelectedIndex = -1;

function onNameInput() {
  const q = document.getElementById('nameInput').value.trim().toLowerCase();
  const list = document.getElementById('autocompleteList');
  hideVerifyResult();

  if (q.length < 1) { list.classList.remove('open'); return; }

  const matches = volunteerData
    .filter(v => v.name.toLowerCase().includes(q))
    .slice(0, 8);

  if (matches.length === 0) { list.classList.remove('open'); return; }

  list.innerHTML = matches.map((v, i) =>
    `<div class="autocomplete-item" data-index="${i}" data-name="${v.name}" onmousedown="selectName('${v.name.replace(/'/g,"\\'")}')">
      ${v.name}
    </div>`
  ).join('');
  acSelectedIndex = -1;
  list.classList.add('open');
}

function onNameKeydown(e) {
  const list = document.getElementById('autocompleteList');
  const items = list.querySelectorAll('.autocomplete-item');
  if (!list.classList.contains('open')) return;

  if (e.key === 'ArrowDown') {
    acSelectedIndex = Math.min(acSelectedIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIndex));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    acSelectedIndex = Math.max(acSelectedIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIndex));
    e.preventDefault();
  } else if (e.key === 'Enter' && acSelectedIndex >= 0) {
    selectName(items[acSelectedIndex].dataset.name);
    e.preventDefault();
  } else if (e.key === 'Escape') {
    list.classList.remove('open');
  }
}

function selectName(name) {
  document.getElementById('nameInput').value = name;
  document.getElementById('autocompleteList').classList.remove('open');
  document.getElementById('phoneInput').focus();
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.autocomplete-wrapper')) {
    document.getElementById('autocompleteList').classList.remove('open');
  }
});

// ============================================================
// IDENTITY VERIFICATION
// ============================================================
async function verifyIdentity() {
  const name = document.getElementById('nameInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();

  if (!name) { showVerifyError('請輸入義工姓名'); return; }
  if (phone.length !== 4) { showVerifyError('請輸入電話尾4位數字'); return; }

  const btn = document.getElementById('verifyBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>核對中...';

  try {
    // Check locally first (faster)
    const match = volunteerData.find(v =>
      v.name.trim().toLowerCase() === name.trim().toLowerCase() &&
      v.whatsapp && v.whatsapp.toString().replace(/\s/g,'').slice(-4) === phone
    );

    if (match) {
      selectedVolunteer = match;
      // Check existing punch status from server
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getPunchStatus&name=${encodeURIComponent(match.name)}&date=${getTodayDate()}`);
      const json = await res.json();
      currentPunchState = json.punchIn ? { time: json.punchInTime, sheetRow: json.sheetRow } : null;
      goToStep2();
    } else {
      // Fallback: verify via server (handles partial matches / phone format variations)
      const res = await fetch(`${APPS_SCRIPT_URL}?action=verify&name=${encodeURIComponent(name)}&phone=${phone}`);
      const json = await res.json();
      if (json.verified) {
        selectedVolunteer = volunteerData.find(v => v.name === json.name) || { name: json.name, rowIndex: null };
        const statusRes = await fetch(APPS_SCRIPT_URL + '?action=getPunchStatus&name=' + encodeURIComponent(json.name) + '&date=' + getTodayDate());
        const statusJson = await statusRes.json();
        currentPunchState = statusJson.punchIn ? { time: statusJson.punchInTime, sheetRow: statusJson.sheetRow } : null;
        goToStep2();
      } else {
        showVerifyError(json.message || '找不到符合的義工記錄，請核查姓名及電話尾4位');
      } else {
        showVerifyError('找不到符合的義工記錄，請檢查姓名及電話');
      }
    }
  } catch(e) {
    showVerifyError('連線錯誤，請稍後再試');
  }

  btn.disabled = false;
  btn.innerHTML = '核對身份';
}

function showVerifyError(msg) {
  const r = document.getElementById('verifyResult');
  document.getElementById('verifyIcon').textContent = '❌';
  document.getElementById('verifyMsg').textContent = msg;
  r.className = 'verify-result error';
}

function hideVerifyResult() {
  document.getElementById('verifyResult').className = 'verify-result';
}

// ============================================================
// STEP NAVIGATION
// ============================================================
function goToStep2() {
  const name = selectedVolunteer.name;
  document.getElementById('confirmedName').textContent = name;
  document.getElementById('confirmedNum').textContent = '義工編號 #' + (selectedVolunteer.rowIndex || '–');
  document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();

  updatePunchUI();
  setStep(2);
}

function updatePunchUI() {
  const badge = document.getElementById('punchStatusBadge');
  const timeDisplay = document.getElementById('checkinTimeDisplay');
  const punchBtn = document.getElementById('punchBtn');

  if (currentPunchState) {
    // Already punched in — show punch OUT
    badge.innerHTML = `<div class="punch-status-badge badge-in"><div class="badge-dot"></div>已簽到 · 工作中</div>`;
    timeDisplay.innerHTML = `<div class="checkin-time-display">簽到時間：<span>${currentPunchState.time}</span></div>`;
    punchBtn.className = 'btn btn-punch-out';
    punchBtn.textContent = 'PUNCH OUT';
  } else {
    // Not punched in
    badge.innerHTML = `<div class="punch-status-badge badge-not-in"><div class="badge-dot"></div>未簽到</div>`;
    timeDisplay.innerHTML = '';
    punchBtn.className = 'btn btn-punch-in';
    punchBtn.textContent = 'PUNCH IN';
  }
}

function setStep(n) {
  document.querySelectorAll('.step').forEach((el, i) => el.classList.toggle('active', i === n - 1));
  document.querySelectorAll('.step-dot').forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i === n - 1) el.classList.add('active');
    else if (i < n - 1) el.classList.add('done');
  });
}

function resetToStep1() {
  selectedVolunteer = null;
  currentPunchState = null;
  document.getElementById('nameInput').value = '';
  document.getElementById('phoneInput').value = '';
  hideVerifyResult();
  setStep(1);
}

// ============================================================
// PUNCH ACTION
// ============================================================
async function doPunch() {
  const punchBtn = document.getElementById('punchBtn');
  punchBtn.disabled = true;
  const isPunchOut = !!currentPunchState;
  punchBtn.innerHTML = `<span class="loading-spinner"></span>${isPunchOut ? '簽退中...' : '簽到中...'}`;

  const now = new Date();
  const timeStr = formatDateTime(now);

  try {
    const payload = {
      action: isPunchOut ? 'punchOut' : 'punchIn',
      name: selectedVolunteer.name,
      rowIndex: selectedVolunteer.rowIndex,
      date: getTodayDate(),
      time: timeStr,
      sheetRow: isPunchOut ? currentPunchState.sheetRow : null
    };

    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const json = await res.json();

    if (json.success) {
      showSuccess(isPunchOut, timeStr, json);
    } else {
      alert('打卡失敗：' + (json.error || '未知錯誤'));
      punchBtn.disabled = false;
      punchBtn.innerHTML = isPunchOut ? 'PUNCH OUT' : 'PUNCH IN';
    }
  } catch(e) {
    alert('連線錯誤，請稍後再試');
    punchBtn.disabled = false;
    punchBtn.innerHTML = isPunchOut ? 'PUNCH OUT' : 'PUNCH IN';
  }
}

function showSuccess(isPunchOut, timeStr, serverData) {
  if (isPunchOut) {
    document.getElementById('successIcon').textContent = '🏁';
    document.getElementById('successMsg').textContent = '簽退成功！多謝你今日的付出！';
    document.getElementById('successSub').textContent = '你的義工時數已自動記錄，感謝你對 Salford Hongkongers 的貢獻！';
    document.getElementById('successDetail').innerHTML = `
      <div class="success-detail-row"><span>義工姓名</span><span>${selectedVolunteer.name}</span></div>
      <div class="success-detail-row"><span>簽到時間</span><span>${currentPunchState.time}</span></div>
      <div class="success-detail-row"><span>簽退時間</span><span>${timeStr}</span></div>
      <div class="success-detail-row"><span>今日工作時長</span><span>${serverData.hours || '計算中...'}</span></div>
    `;
  } else {
    document.getElementById('successIcon').textContent = '✅';
    document.getElementById('successMsg').textContent = '簽到成功！';
    document.getElementById('successSub').textContent = '歡迎！打卡記錄已儲存，記得完成後再次 Punch Out。';
    document.getElementById('successDetail').innerHTML = `
      <div class="success-detail-row"><span>義工姓名</span><span>${selectedVolunteer.name}</span></div>
      <div class="success-detail-row"><span>簽到時間</span><span>${timeStr}</span></div>
      <div class="success-detail-row"><span>日期</span><span>${getTodayDate()}</span></div>
    `;
  }
  setStep(3);
}

// ============================================================
// HELPERS
// ============================================================
function getTodayDate() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateTime(d) {
  return `${getTodayDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
