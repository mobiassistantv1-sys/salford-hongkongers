<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>義工簽到 | Salford Hongkongers</title>
<style>
:root {
  --pink: #ff2d78;
  --blue: #00d4ff;
  --purple: #b44fff;
  --green-neon: #39ff14;
  --gold: #ffd700;
  --silver: #c0c0c0;
  --bronze: #cd7f32;
  --bg: #0a0a0f;
  --card-bg: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.1);
  --text: #f0f0f0;
  --text-muted: rgba(255,255,255,0.45);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(255,45,120,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.08) 0%, transparent 50%);
}

/* NAV */
nav {
  background: rgba(10,10,15,0.95);
  border-bottom: 1px solid rgba(255,45,120,0.3);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}
nav .logo { color: #fff; font-size: 1rem; font-weight: 800; letter-spacing: -0.3px; }
nav .logo span { color: var(--pink); text-shadow: 0 0 10px var(--pink); }
nav .nav-time {
  color: var(--blue); font-size: 0.88rem;
  font-variant-numeric: tabular-nums; font-weight: 700;
  text-shadow: 0 0 8px var(--blue);
}
nav .back-btn {
  color: var(--text-muted); font-size: 0.85rem;
  text-decoration: none; display: flex; align-items: center; gap: 4px;
  transition: color 0.2s;
}
nav .back-btn:hover { color: var(--pink); }

/* LAYOUT */
.page {
  display: flex; flex-direction: column; gap: 16px;
  padding: 20px 16px 40px;
  max-width: 480px; margin: 0 auto; width: 100%;
}

/* ┌── LEADERBOARD ─────────────────────────────────────────┐ */
.leaderboard {
  background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(180,79,255,0.08));
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: var(--radius);
  padding: 20px 18px 18px;
  box-shadow: 0 0 20px rgba(255,215,0,0.08);
}
.lb-header {
  text-align: center;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 10px rgba(255,215,0,0.6);
  margin-bottom: 16px;
}
.lb-month {
  display: block;
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  margin-top: 3px;
  text-transform: none;
  font-weight: 500;
}
.lb-list {
  display: flex; flex-direction: column; gap: 10px;
  list-style: none;
}
.lb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.3s;
}
.lb-item:hover {
  border-color: rgba(255,215,0,0.3);
  background: rgba(255,215,0,0.05);
  transform: translateX(2px);
}

/* Rank badges */
.lb-rank {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 0.85rem;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.lb-item[data-rank="1"] .lb-rank {
  background: linear-gradient(135deg, #ffd700, #ffed4e);
  color: #1a1a1a;
  box-shadow: 0 0 16px rgba(255,215,0,0.6), 0 2px 8px rgba(0,0,0,0.3);
}
.lb-item[data-rank="2"] .lb-rank {
  background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
  color: #1a1a1a;
  box-shadow: 0 0 12px rgba(192,192,192,0.5);
}
.lb-item[data-rank="3"] .lb-rank {
  background: linear-gradient(135deg, #cd7f32, #e09b5f);
  color: #1a1a1a;
  box-shadow: 0 0 12px rgba(205,127,50,0.5);
}
.lb-item:not([data-rank="1"]):not([data-rank="2"]):not([data-rank="3"]) .lb-rank {
  background: rgba(255,255,255,0.08);
  color: var(--text-muted);
  font-weight: 700;
  border: 1px solid rgba(255,255,255,0.12);
}

.lb-info { flex: 1; min-width: 0; }
.lb-name {
  font-weight: 700;
  font-size: 0.92rem;
  margin-bottom: 2px;
  display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lb-item[data-rank="1"] .lb-name { color: var(--gold); }
.lb-item[data-rank="2"] .lb-name { color: var(--silver); }
.lb-item[data-rank="3"] .lb-name { color: var(--bronze); }

.lb-desc {
  font-size: 0.75rem;
  color: var(--text-muted);
  display: block;
}

.lb-score {
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--blue);
  flex-shrink: 0;
  text-shadow: 0 0 8px rgba(0,212,255,0.5);
  font-variant-numeric: tabular-nums;
}
.lb-item[data-rank="1"] .lb-score { color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.6); }

/* ┌── FORM CARD ─────────────────────────────────────────┐ */
.form-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.form-title {
  font-size: 1.3rem;
  font-weight: 800;
  text-align: center;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--pink), var(--blue));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.form-subtitle {
  text-align: center;
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 20px;
}
label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}
input, select {
  width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 0.95rem;
  transition: all 0.3s;
  font-family: inherit;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--pink);
  background: rgba(255,45,120,0.08);
  box-shadow: 0 0 0 3px rgba(255,45,120,0.15);
}
select {
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%23ff2d78' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 16px center;
  padding-right: 44px;
}

.submit-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(255,45,120,0.3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(255,45,120,0.45);
}
.submit-btn:active {
  transform: translateY(0);
}
.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(10,10,15,0.95);
  color: #fff;
  padding: 14px 24px;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  font-size: 0.9rem;
  font-weight: 600;
  z-index: 1000;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success {
  border-color: var(--green-neon);
  box-shadow: 0 8px 32px rgba(57,255,20,0.25);
}
.toast.error {
  border-color: var(--pink);
  box-shadow: 0 8px 32px rgba(255,45,120,0.25);
}
</style>
</head>
<body>
<nav>
<div class="logo">Salford <span>Hongkongers</span></div>
<div class="nav-time" id="currentTime">00:00</div>
<a class="back-btn" href="index.html">← 返回主頁</a>
</nav>

<div class="page">
<!-- ┌── TOP 3 LEADERBOARD ────────────────────────────────┐ -->
<section class="leaderboard">
<div class="lb-header">
本月排行榜
<span class="lb-month" id="currentMonth">2025年3月</span>
</div>
<ol class="lb-list" id="leaderboardList">
<li class="lb-item" data-rank="1">
<div class="lb-rank">1</div>
<div class="lb-info">
<span class="lb-name">載入中...</span>
<span class="lb-desc">本月簽到次數</span>
</div>
<div class="lb-score">0</div>
</li>
<li class="lb-item" data-rank="2">
<div class="lb-rank">2</div>
<div class="lb-info">
<span class="lb-name">載入中...</span>
<span class="lb-desc">本月簽到次數</span>
</div>
<div class="lb-score">0</div>
</li>
<li class="lb-item" data-rank="3">
<div class="lb-rank">3</div>
<div class="lb-info">
<span class="lb-name">載入中...</span>
<span class="lb-desc">本月簽到次數</span>
</div>
<div class="lb-score">0</div>
</li>
</ol>
</section>

<!-- ┌── FORM CARD ────────────────────────────────────────┐ -->
<section class="form-card">
<h1 class="form-title">義工簽到</h1>
<p class="form-subtitle">請選擇你的名字並簽到</p>
<form id="checkinForm">
<div class="form-group">
<label for="volunteerName">義工名稱 *</label>
<select id="volunteerName" name="volunteerName" required="">
<option value="">-- 請選擇你的名字 --</option>
</select>
</div>
<button class="submit-btn" type="submit">簽到</button>
</form>
</section>

<!-- ┌── JOIN SECTION ─────────────────────────────────────────┐ -->
<section class="form-card" style="margin-top:0;">
<h2 class="form-title" style="font-size:1.1rem;">加入義工團隊</h2>
<p class="form-subtitle" style="margin-bottom:16px;">想成為義工？填寫以下資料，我們會聯絡你！</p>
<form id="joinForm">
<div class="form-group">
<label for="joinName">全名 *</label>
<input id="joinName" name="joinName" placeholder="請輸入你的全名" required type="text"/>
</div>
<div class="form-group">
<label for="joinWhatsApp">WhatsApp 號碼 *</label>
<input id="joinWhatsApp" inputmode="tel" name="joinWhatsApp" placeholder="例：07712345678" required type="tel"/>
</div>
<div class="form-group">
<label for="joinNote">備註（選填）</label>
<input id="joinNote" name="joinNote" placeholder="例：只能週末參與" type="text"/>
</div>
<button class="submit-btn" style="background:linear-gradient(135deg,#00d4ff,#b44fff);" type="submit">提交登記</button>
</form>
</section>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ────────────────────────────────────────────────────────────
// CONFIG
// ────────────────────────────────────────────────────────────
const SHEET_ID = '1pIkC3TMUcMCzMUKqMN-JBfiFnBJSJbvqyiASKHWQR-w';
const VOLUNTEERS_SHEET = 'Volunteers';
const CHECKIN_SHEET = 'CheckIns';
const LEADERBOARD_SHEET = 'Leaderboard';
const API_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

// 註：Google Apps Script Web App URL for POST
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxc_hf9Dw9QHMRO-X1_HEL7HaO_F6OhkJgSC1CojqLdp6I2yDI5hkbpn4rqXCRAf-q4/exec';

// ────────────────────────────────────────────────────────────
// UTILITIES
// ────────────────────────────────────────────────────────────
function parseGoogleSheetsResponse(text) {
  const jsonString = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/s)?.[1];
  if (!jsonString) throw new Error('Invalid response format');
  return JSON.parse(jsonString);
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type}`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function formatTime() {
  const now = new Date();
  return now.toLocaleTimeString('zh-HK', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });
}

function updateClock() {
  document.getElementById('currentTime').textContent = formatTime();
}

function updateMonthDisplay() {
  const now = new Date();
  const monthStr = now.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long' });
  document.getElementById('currentMonth').textContent = monthStr;
}

// ────────────────────────────────────────────────────────────
// LOAD VOLUNTEERS (for dropdown)
// ────────────────────────────────────────────────────────────
async function loadVolunteers() {
  try {
    const url = API_BASE + encodeURIComponent(VOLUNTEERS_SHEET);
    const res = await fetch(url);
    const text = await res.text();
    const data = parseGoogleSheetsResponse(text);
    const rows = data.table.rows;

    const select = document.getElementById('volunteerName');
    select.innerHTML = '<option value="">-- 請選擇你的名字 --</option>';

    rows.forEach(row => {
      const name = row.c[0]?.v; // Column A = Name
      if (name) {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      }
    });
  } catch (err) {
    console.error('Failed to load volunteers:', err);
    showToast('載入義工名單失敗', 'error');
  }
}

// ────────────────────────────────────────────────────────────
// LOAD LEADERBOARD (Top 3)
// ────────────────────────────────────────────────────────────
async function loadLeaderboard() {
  try {
    const url = API_BASE + encodeURIComponent(LEADERBOARD_SHEET);
    const res = await fetch(url);
    const text = await res.text();
    const data = parseGoogleSheetsResponse(text);
    const rows = data.table.rows.slice(0, 3); // Top 3 only

    const listEl = document.getElementById('leaderboardList');
    listEl.innerHTML = '';

    rows.forEach((row, index) => {
      const rank = index + 1;
      const name = row.c[0]?.v || '未有資料';
      const count = row.c[1]?.v || 0;

      const li = document.createElement('li');
      li.className = 'lb-item';
      li.setAttribute('data-rank', rank);

      li.innerHTML = `
        <div class="lb-rank">${rank}</div>
        <div class="lb-info">
          <span class="lb-name">${name}</span>
          <span class="lb-desc">本月簽到次數</span>
        </div>
        <div class="lb-score">${count}</div>
      `;
      listEl.appendChild(li);
    });
  } catch (err) {
    console.error('Failed to load leaderboard:', err);
  }
}

// ────────────────────────────────────────────────────────────
// SUBMIT CHECK-IN (via Google Apps Script)
// ────────────────────────────────────────────────────────────
document.getElementById('checkinForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const nameField = document.getElementById('volunteerName');
  const name = nameField.value.trim();

  if (!name) {
    showToast('請選擇你的名字', 'error');
    return;
  }

  const btn = e.target.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '簽到中...';

  try {
    // POST to Google Apps Script
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        volunteerName: name,
        timestamp: new Date().toISOString()
      })
    });

    const result = await res.json();

    if (result.status === 'success') {
      showToast(`✓ 簽到成功！${name}`, 'success');
      nameField.value = '';
      // Reload leaderboard after a short delay
      setTimeout(loadLeaderboard, 1000);
    } else {
      showToast(result.message || '簽到失敗', 'error');
    }
  } catch (err) {
    console.error('Check-in error:', err);
    showToast('簽到失敗，請稍後再試', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '簽到';
  }
});

// ────────────────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────────────────
updateClock();
setInterval(updateClock, 1000);
updateMonthDisplay();

loadVolunteers();
loadLeaderboard();
// Refresh leaderboard every 30s
setInterval(loadLeaderboard, 30000);

// ────────────────────────────────────────────────────────────
// JOIN FORM SUBMISSION
// ────────────────────────────────────────────────────────────
document.getElementById('joinForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const name = document.getElementById('joinName').value.trim();
  const whatsapp = document.getElementById('joinWhatsApp').value.trim();
  const note = document.getElementById('joinNote').value.trim();

  if (!name || !whatsapp) {
    showToast('請填寫全名及 WhatsApp 號碼', 'error');
    return;
  }

  const btn = e.target.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        action: 'join',
        name: name,
        whatsapp: whatsapp,
        note: note,
        timestamp: new Date().toLocaleString('zh-HK', { timeZone: 'Europe/London', hour12: false })
      })
    });

    const result = await res.json();
    if (result.status === 'success') {
      showToast(`✓ 登記成功！我們會盡快聯絡你`, 'success');
      e.target.reset();
    } else {
      showToast(result.message || '登記失敗，請稍後再試', 'error');
    }
  } catch (err) {
    console.error('Join error:', err);
    showToast('登記失敗，請稍後再試', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '提交登記';
  }
});
</script>
</body>
</html>
