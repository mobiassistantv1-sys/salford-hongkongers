<!DOCTYPE html>

<html lang="zh-HK">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>義工登到 | Salford Hongkongers</title>
<style>
:root {
  --pink: #ff2d78;
  --blue: #00d4ff;
  --purple: #b44fff;
  --green-neon: #39ff14;
  --bg: #0a0a0f;
  --card-bg: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.1);
  --text: #f0f0f0;
  --text-muted: rgba(255,255,255,0.45);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(255,45,120,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.08) 0%, transparent 50%);
}

/* NAV */
nav {
  background: rgba(10,10,15,0.95);
  border-bottom: 1px solid rgba(255,45,120,0.3);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}
nav .logo {
  color: #fff;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: -0.3px;
}
nav .logo span {
  color: var(--pink);
  text-shadow: 0 0 10px var(--pink);
}
nav .nav-time {
  color: var(--blue);
  font-size: 0.88rem;
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  text-shadow: 0 0 8px var(--blue);
}
nav .back-btn {
  color: var(--text-muted);
  font-size: 0.85rem;
  text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  transition: color 0.2s;
}
nav .back-btn:hover { color: var(--pink); }

/* LAYOUT */
.page {
  display: flex; flex-direction: column; gap: 16px;
  padding: 20px 16px 40px;
  max-width: 560px; margin: 0 auto; width: 100%;
}

/* CLOCK HERO */
.clock-hero {
  background: linear-gradient(135deg, rgba(255,45,120,0.15), rgba(0,212,255,0.1));
  border: 1px solid rgba(255,45,120,0.3);
  border-radius: var(--radius);
  padding: 28px 20px 22px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(255,45,120,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
}
.clock-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
  pointer-events: none;
}
.clock-display {
  font-size: 3.4rem; font-weight: 800;
  letter-spacing: 6px; font-variant-numeric: tabular-nums;
  line-height: 1; margin-bottom: 8px;
  color: #fff;
  text-shadow: 0 0 20px rgba(255,45,120,0.8), 0 0 40px rgba(255,45,120,0.4);
}
.clock-date {
  font-size: 0.9rem;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}

/* CARD */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.08);
}
.card.success {
  background: linear-gradient(135deg, rgba(57,255,20,0.15), rgba(0,212,255,0.1));
  border-color: rgba(57,255,20,0.4);
}
.card.error {
  background: linear-gradient(135deg, rgba(255,45,120,0.15), rgba(180,255,255,0.1));
  border-color: rgba(255,45,120,0.4);
}

/* SECTION */
.section-title {
  font-size: 1.15rem; font-weight: 600;
  color: #fff; margin-bottom: 12px;
  letter-spacing: 0.3px;
}

/* LABEL & SELECT style */
label {
  display: block;
  font-size: 0.92rem;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 500;
}
select {
  width: 100%;
  padding: 10px 14px;
  font-size: 0.95rem;
  color: #fff;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  outline: none;
  transition: all 0.3s;
  cursor: pointer;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='6' viewBox='0 0 12 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 0.5L6 5.5L11 0.5' stroke='%23ffffff66'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: calc(100% - 14px) center;
  appearance: none;
  padding-right: 36px;
}
select:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 1px var(--pink);
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px 20px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  border: none;
  border-radius: 12px;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
button.primary {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  box-shadow: 0 4px 15px rgba(255,45,120,0.3);
}
button.primary:hover:not(:disabled) {
  box-shadow: 0 8px 25px rgba(255,45,120,0.5);
  transform: translateY(-1px);
}
button.primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
button.secondary {
  background: rgba(255,255,255,0.1);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.2);
}
button.secondary:hover {
  background: rgba(255,255,255,0.15);
}

/* INFO ROW */
.info-row {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  padding: 12px 14px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  font-size: 0.85rem;
}
.info-row .label-text {
  color: var(--text-muted);
  font-weight: 500;
}
.info-row .value-text {
  color: #fff;
  font-weight: 700;
  letter-spacing: 0.3px;
}

/* LIST */
ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
li {
  padding: 9px 12px;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 0.87rem;
  letter-spacing: 0.3px;
}
li .emo {
  margin-right: 6px;
}
li .time {
  display: block;
  margin-top: 4px;
  font-size: 0.78rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

/* SUCCESS icon */
.success-icon {
  font-size: 3.5rem;
  line-height: 1;
  margin: 0 auto 20px;
  width: 90px; height: 90px;
  background: linear-gradient(135deg, rgba(57,255,20,0.2), rgba(0,212,255,0.1));
  border: 2px solid var(--green-neon);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  text-shadow: 0 0 20px var(--green-neon);
  animation: popIn 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes popIn {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

.message-text {
  font-size: 1.15rem;
  line-height: 1.6;
  color: #fff;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 0.4px;
}
.sub-text {
  font-size: 0.9rem;
  color: var(--text-muted);
  text-align: center;
}

/* SPINNER */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.spinner {
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--pink);
  border-radius: 50%;
  width: 24px; height: 24px;
  animation: spin 0.7s linear infinite;
  margin: 0 auto;
}

.loading-blank {
  height: 32px;
}

/* Hide root no-monitors warning */
body:before {
  content: "";
  display: none;
}
</style>
</head>
<body>
<!-- NAV -->
<nav>
<div class="logo">Salford<br/><span>Hongkongers</span></div>
<div class="nav-time" id="navTime">--:--</div>
</nav>
<div class="page">
<!-- CLOCK MINI HERO -->
<div class="clock-hero">
<div class="clock-display" id="clockDisplay">00:00</div>
<div class="clock-date" id="clockDate">- </div>
</div>
<!-- INITIAL SELECTION Screen (id="screen1") -->
<div id="screen1">
<div class="card">
<div class="section-title">工作登記 義工登到</div>
<label>請選擇你下列活動</label>
<select id="selectActivity">
<option value="">請選擇...</option>
</select>
<div class="loading-blank"></div>
</div>
<button class="primary" disabled="" id="btnStart">選擇活動</button>
</div>
<!-- ACTIVITY SCREEN (id="screen2") -->
<div id="screen2" style="display:none">
<div class="card">
<div class="section-title">活動資訊</div>
<div class="info-row">
<span class="label-text">活動名稱:</span>
<span class="value-text" id="infoActivityName">-</span>
</div>
<div class="info-row">
<span class="label-text">日期:</span>
<span class="value-text" id="infoActivityDate">-</span>
</div>
</div>
<div class="card">
<div class="section-title">請確認已經登記行了</div>
<label>你「最想要的真名？」</label>
<select id="selectSection">
<option value="">請選擇性名…</option>
</select>
<div class="loading-blank"></div>
</div>
<button class="primary" disabled="" id="btnCheckin">登記</button>
<button class="secondary" id="btnBack1">返一步活動</button>
</div>
<!-- SUCCESS SCREEN (id="screen3") -->
<div id="screen3" style="display:none">
<div class="card success">
<div class="success-icon">✔</div>
<div class="message-text congrats">成功登錄!感謝你的貢獻！</div>
<div class="sub-text">我們已收到 Sheet API, 現在可以 https://salfordhongkongers.co.uk/volunteer-dashboard 觀( 名單常常尋小不公開好 話誠講 ":) 🚀</div>
</div>
<button class="secondary" id="btnBack2">回到頁晤（Overview或再列活動）</button>
</div>
<!-- ERROR SCREEN (id="screenError") -->
<div id="screenError" style="display:none">
<div class="card error">
<div class="message-text">錯誤失敗</div>
<div class="sub-text" id="errorText">請重新一次。</div>
</div>
<button class="secondary" id="btnBack3">返回</button>
</div>
</div>
<script>

// -------------------------------------
// (1) Global / State
// -------------------------------------
const API = 'https://script.google.com/macros/s/AKfycbxlSEI9vj0rignRVwTWTNQvIoTvMFaHjySpknp8O4XtKkZ-hrHEuqwtNffiL7E0xfn_S/exec';

let activities = [];
let currentActivity = null;
let sections = [];

// -------------------------------------
// (2) Clock & Time
// -------------------------------------
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  
  const clockStr = `${hh}:${mm}`;
  const navStr   = `${hh}:${mm}:${ss}`;
  
  document.getElementById('clockDisplay').textContent = clockStr;
  document.getElementById('navTime').textContent = navStr;
  
  // date
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const wd = weekdays[now.getDay()];
  
  document.getElementById('clockDate').textContent = `${y}-${m}-${d} ${wd}`;
}
setInterval(updateClock, 1000);
updateClock();

// -------------------------------------
// (3) Screen Logic
// -------------------------------------
function showScreen(screenId) {
  ['screen1','screen2','screen3','screenError'].forEach(s=>{
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(screenId).style.display = 'block';
}

// -------------------------------------
// (4) API Fetch
// -------------------------------------
async function loadActivities() {
  try {
    const res = await fetch(`${API}?action=getActivities`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error || 'Failed to load activities');
    activities = data.activities;
    
    const sel = document.getElementById('selectActivity');
    sel.innerHTML = '<option value="">請選擇...</option>';
    activities.forEach(act => {
      const opt = document.createElement('option');
      opt.value = act.id;
      opt.textContent = `${act.name} (${act.date})`;
      sel.appendChild(opt);
    });
  } catch(err) {
    console.error(err);
    alert('無法載入活動列表: ' + err.message);
  }
}

async function loadSections(activityId) {
  try {
    const res = await fetch(`${API}?action=getSections&activityId=${activityId}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error || 'Failed to load sections');
    sections = data.sections;
    
    const sel = document.getElementById('selectSection');
    sel.innerHTML = '<option value="">請選擇性名…</option>';
    sections.forEach(sec => {
      const opt = document.createElement('option');
      opt.value = sec.id;
      opt.textContent = sec.name;
      sel.appendChild(opt);
    });
  } catch(err) {
    console.error(err);
    alert('無法載入組別: ' + err.message);
  }
}

async function submitCheckin(activityId, sectionId, sectionName) {
  try {
    const res = await fetch(`${API}?action=checkin&activityId=${activityId}&sectionId=${sectionId}&sectionName=${encodeURIComponent(sectionName)}`);
    const data = await res.json();
    if(!data.success) throw new Error(data.error || 'Check-in failed');
    return data;
  } catch(err) {
    console.error(err);
    throw err;
  }
}

// -------------------------------------
// (5) Event Handlers
// -------------------------------------
document.getElementById('selectActivity').addEventListener('change', (e)=>{
  const val = e.target.value;
  document.getElementById('btnStart').disabled = !val;
});

document.getElementById('btnStart').addEventListener('click', ()=>{
  const actId = document.getElementById('selectActivity').value;
  if(!actId) return;
  
  currentActivity = activities.find(a=>a.id===actId);
  if(!currentActivity) return;
  
  document.getElementById('infoActivityName').textContent = currentActivity.name;
  document.getElementById('infoActivityDate').textContent = currentActivity.date;
  
  showScreen('screen2');
  loadSections(actId);
});

document.getElementById('selectSection').addEventListener('change', (e)=>{
  const val = e.target.value;
  document.getElementById('btnCheckin').disabled = !val;
});

document.getElementById('btnCheckin').addEventListener('click', async ()=>{
  const sectionId = document.getElementById('selectSection').value;
  if(!sectionId || !currentActivity) return;
  
  const section = sections.find(s=>s.id===sectionId);
  if(!section) return;
  
  try {
    document.getElementById('btnCheckin').disabled = true;
    document.getElementById('btnCheckin').textContent = '處理中...';
    
    await submitCheckin(currentActivity.id, sectionId, section.name);
    
    showScreen('screen3');
  } catch(err) {
    document.getElementById('errorText').textContent = err.message;
    showScreen('screenError');
  } finally {
    document.getElementById('btnCheckin').disabled = false;
    document.getElementById('btnCheckin').textContent = '登記';
  }
});

document.getElementById('btnBack1').addEventListener('click', ()=>{
  showScreen('screen1');
});

document.getElementById('btnBack2').addEventListener('click', ()=>{
  showScreen('screen1');
  document.getElementById('selectActivity').value = '';
  document.getElementById('btnStart').disabled = true;
});

document.getElementById('btnBack3').addEventListener('click', ()=>{
  showScreen('screen2');
});

// -------------------------------------
// (6) Init
// -------------------------------------
window.addEventListener('DOMContentLoaded', ()=>{
  loadActivities();
});

</script>

            </label>
<label onmouseout="this.style.background='rgba(255,255,255,0.03)'" onmouseover="this.style.background='rgba(255,45,120,0.1)'" style="display: flex; align-items: center; color: var(--text); cursor: pointer; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 6px; transition: all 0.3s;">
<input name="interests" style="margin-right: 10px; width: 18px; height: 18px; accent-color: var(--pink);" type="checkbox" value="admin"/>
              行政支援
            </label>
<label onmouseout="this.style.background='rgba(255,255,255,0.03)'" onmouseover="this.style.background='rgba(255,45,120,0.1)'" style="display: flex; align-items: center; color: var(--text); cursor: pointer; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 6px; transition: all 0.3s;">
<input name="interests" style="margin-right: 10px; width: 18px; height: 18px; accent-color: var(--pink);" type="checkbox" value="other"/>
              其他（請在下方說明）
            </label>
</div>
</div>
<div style="margin-bottom: 20px;">
<label style="display: block; color: var(--text); margin-bottom: 8px; font-size: 0.95rem;">
            你有什麼技能或經驗想與我們分享？
          </label>
<textarea name="skills" onblur="this.style.borderColor='rgba(255,255,255,0.2)'; this.style.background='rgba(255,255,255,0.05)';" onfocus="this.style.borderColor='var(--pink)'; this.style.background='rgba(255,45,120,0.1)';" rows="4" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: var(--text); font-size: 1rem; font-family: inherit; resize: vertical; outline: none; transition: all 0.3s;"></textarea>
</div>
<div style="margin-bottom: 25px;">
<label style="display: block; color: var(--text); margin-bottom: 8px; font-size: 0.95rem;">
            你每月大約可以貢獻多少時間？
          </label>
<select name="availability" onblur="this.style.borderColor='rgba(255,255,255,0.2)'; this.style.background='rgba(255,255,255,0.05)';" onfocus="this.style.borderColor='var(--pink)'; this.style.background='rgba(255,45,120,0.1)';" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: var(--text); font-size: 1rem; cursor: pointer; outline: none; transition: all 0.3s;">

          </label>
<textarea name="message" onblur="this.style.borderColor='rgba(255,255,255,0.2)'; this.style.background='rgba(255,255,255,0.05)';" onfocus="this.style.borderColor='var(--pink)'; this.style.background='rgba(255,45,120,0.1)';" rows="4" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: var(--text); font-size: 1rem; font-family: inherit; resize: vertical; outline: none; transition: all 0.3s;"></textarea>

          提交登記
        </button>
</form>
<div id="registration-success" style="display: none; text-align: center; padding: 30px;">
<div style="font-size: 3rem; margin-bottom: 15px;">✓</div>
<h3 style="color: var(--green-neon); margin-bottom: 10px;">登記成功！</h3>
<p style="color: var(--text-muted);">感謝你加入我們的義工團隊，我們會盡快聯絡你！</p>
</div>
</div>
</div>
</div>
<script>
// Handle volunteer registration form submission
document.getElementById('form-volunteer-registration').addEventListener('submit', function(e) {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = {};

  // Collect all form data
  for (let [key, value] of formData.entries()) {
    if (key === 'interests') {
      if (!data[key]) data[key] = [];
      data[key].push(value);
    } else {
      data[key] = value;
    }
  }

  // Validate required fields
  if (!data.name || !data.email || !data.interests || data.interests.length === 0) {
    alert('請填寫所有必填欄位');
    return;
  }

  // Send to Google Apps Script
  fetch('https://script.google.com/macros/s/AKfycbyBCfJ_G5MiNcvBh-FHWv2f0sC2vDz3zNnHpLPtRg/exec', {
    method: 'POST',
    mode: 'no-cors',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      type: 'volunteer',
      ...data,
      interests: data.interests.join(', '),
      timestamp: new Date().toISOString()
    })
  })
  .then(() => {
    // Show success message
    e.target.style.display = 'none';
    document.getElementById('registration-success').style.display = 'block';

    // Reset after 3 seconds
    setTimeout(() => {
      e.target.reset();
      e.target.style.display = 'block';
      document.getElementById('registration-success').style.display = 'none';
    }, 3000);
  })
  .catch(error => {
    console.error('Error:', error);
    alert('提交失敗，請稍後再試');
  });
});
</script>
</body>
</html>
