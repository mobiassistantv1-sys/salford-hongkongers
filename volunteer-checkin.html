<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>義工打卡 | Salford Hongkongers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-area img {
      height: 60px;
      border-radius: 50%;
    }
    .logo-area h1 {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      margin-top: 10px;
      letter-spacing: 1px;
    }
    .logo-area p {
      color: #a0aec0;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .step-dot.active { background: #4fc3f7; transform: scale(1.4); }
    .step-dot.done { background: #66bb6a; }

    .step { display: none; }
    .step.active { display: block; }

    h2 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #90caf9;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    label {
      display: block;
      color: #b0bec5;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    input[type="text"], input[type="tel"] {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 18px;
    }
    input[type="text"]:focus, input[type="tel"]:focus {
      border-color: #4fc3f7;
      background: rgba(79,195,247,0.08);
    }
    input::placeholder { color: rgba(255,255,255,0.3); }

    .autocomplete-wrapper { position: relative; margin-bottom: 18px; }
    .autocomplete-wrapper input { margin-bottom: 0; }
    .autocomplete-list {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #1e2a3a;
      border: 1px solid rgba(79,195,247,0.3);
      border-radius: 0 0 10px 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .autocomplete-list.open { display: block; }
    .autocomplete-item {
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.9rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }
    .autocomplete-item:hover, .autocomplete-item.selected { background: rgba(79,195,247,0.15); color: #4fc3f7; }

    .verify-result {
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    .verify-result.success {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(102,187,106,0.15);
      border: 1px solid rgba(102,187,106,0.4);
      color: #a5d6a7;
    }
    .verify-result.error {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(239,83,80,0.15);
      border: 1px solid rgba(239,83,80,0.4);
      color: #ef9a9a;
    }
    .verify-icon { font-size: 1.3rem; }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      color: #fff;
      box-shadow: 0 4px 20px rgba(79,195,247,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(79,195,247,0.4);
    }
    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }
    .btn-punch-in {
      background: linear-gradient(135deg, #66bb6a, #2e7d32);
      color: #fff;
      box-shadow: 0 4px 20px rgba(102,187,106,0.35);
      font-size: 1.2rem;
      padding: 18px;
      letter-spacing: 2px;
    }
    .btn-punch-in:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(102,187,106,0.5);
    }
    .btn-punch-out {
      background: linear-gradient(135deg, #ffa726, #e65100);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,167,38,0.35);
      font-size: 1.2rem;
      padding: 18px;
      letter-spacing: 2px;
    }
    .btn-punch-out:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,167,38,0.5);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: #b0bec5;
      border: 1px solid rgba(255,255,255,0.12);
      margin-top: 10px;
      font-size: 0.9rem;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .volunteer-info-card {
      background: rgba(79,195,247,0.08);
      border: 1px solid rgba(79,195,247,0.25);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .volunteer-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .volunteer-name { color: #fff; font-size: 1rem; font-weight: 700; }
    .volunteer-num { color: #4fc3f7; font-size: 0.8rem; margin-top: 2px; }

    .punch-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .badge-not-in {
      background: rgba(255,255,255,0.07);
      color: #b0bec5;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .badge-in {
      background: rgba(102,187,106,0.15);
      color: #a5d6a7;
      border: 1px solid rgba(102,187,106,0.3);
    }
    .badge-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .badge-not-in .badge-dot { background: #607d8b; }
    .badge-in .badge-dot { background: #66bb6a; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .checkin-time-display {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #90caf9;
    }
    .checkin-time-display span { color: #fff; font-weight: 600; }

    .success-icon { font-size: 4rem; text-align: center; margin-bottom: 16px; }
    .success-msg { color: #fff; font-size: 1.1rem; text-align: center; font-weight: 700; margin-bottom: 8px; }
    .success-sub { color: #90caf9; font-size: 0.85rem; text-align: center; margin-bottom: 24px; line-height: 1.6; }
    .success-detail {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .success-detail-row {
      display: flex;
      justify-content: space-between;
      color: #b0bec5;
      font-size: 0.85rem;
      padding: 4px 0;
    }
    .success-detail-row span:last-child { color: #fff; font-weight: 600; }

    .loading-spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: #4fc3f7;
      font-size: 0.85rem;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-link a:hover { opacity: 1; }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<div class="logo-area">
  <img src="https://mobiassistantv1-sys.github.io/salford-hongkongers/shklogo.jpg" alt="SHK Logo" onerror="this.style.display='none'">
  <h1>Salford Hongkongers</h1>
  <p>義工打卡系統</p>
</div>

<div class="card">
  <div class="step-indicator">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- STEP 1: 輸入姓名 + 電話尾4位 -->
  <div class="step active" id="step1">
    <h2>身份核對</h2>
    <p class="subtitle">請輸入你的義工姓名及電話尾4位</p>

    <label>義工姓名</label>
    <div class="autocomplete-wrapper">
      <input type="text" id="nameInput" placeholder="輸入姓名搜尋..." autocomplete="off" oninput="onNameInput()" onkeydown="onNameKeydown(event)" />
      <div class="autocomplete-list" id="autocompleteList"></div>
    </div>

    <label>電話尾 4 位</label>
    <input type="tel" id="phoneInput" placeholder="例如：3857" maxlength="4" pattern="[0-9]{4}"
      oninput="this.value=this.value.replace(/\D/g,'').slice(0,4)" />

    <div class="verify-result" id="verifyResult">
      <span class="verify-icon" id="verifyIcon"></span>
      <span id="verifyMsg"></span>
    </div>

    <button class="btn btn-primary" id="verifyBtn" onclick="verifyIdentity()">核對身份</button>
  </div>

  <!-- STEP 2: 打卡 -->
  <div class="step" id="step2">
    <h2>義工打卡</h2>
    <p class="subtitle" id="step2Date"></p>

    <div class="volunteer-info-card">
      <div class="volunteer-avatar" id="avatarInitial">?</div>
      <div>
        <div class="volunteer-name" id="confirmedName"></div>
        <div class="volunteer-num" id="confirmedNum"></div>
      </div>
    </div>

    <div id="punchStatusBadge"></div>
    <div id="checkinTimeDisplay"></div>

    <button class="btn btn-punch-in" id="punchBtn" onclick="doPunch()">PUNCH</button>

    <button class="btn btn-secondary" onclick="resetToStep1()">返回 / 換人</button>
  </div>

  <!-- STEP 3: 成功 -->
  <div class="step" id="step3">
    <div class="success-icon" id="successIcon">✅</div>
    <div class="success-msg" id="successMsg">打卡成功！</div>
    <div class="success-sub" id="successSub"></div>
    <div class="success-detail" id="successDetail"></div>
    <button class="btn btn-primary" onclick="resetToStep1()">完成 / 下一位</button>
  </div>
</div>

<div class="back-link">
  <a href="index.html">← 返回主頁</a>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVOLUNTEERCHECKIN_REPLACE_ME/exec';
// Replace the above URL with your deployed Apps Script Web App URL

// Volunteer data loaded from Google Sheets (via Apps Script)
// Format: { name: string, phone_last4: string, rowIndex: number }
let volunteerData = [];
let selectedVolunteer = null;
let currentPunchState = null; // null = not punched in, { time, rowIndex } = punched in

// ============================================================
// INIT
// ============================================================
window.onload = function() {
  updateStep2Date();
  loadVolunteerData();
};

function updateStep2Date() {
  const now = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('step2Date').textContent = now.toLocaleDateString('zh-Hant-HK', opts);
}

async function loadVolunteerData() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getVolunteers');
    const json = await res.json();
    if (json.volunteers) {
      volunteerData = json.volunteers;
    }
  } catch(e) {
    // Fallback: will show error on verify
    console.warn('Could not load volunteer data:', e);
  }
}

// ============================================================
// AUTOCOMPLETE
// ============================================================
let acSelectedIndex = -1;

function onNameInput() {
  const q = document.getElementById('nameInput').value.trim().toLowerCase();
  const list = document.getElementById('autocompleteList');
  hideVerifyResult();

  if (q.length < 1) { list.classList.remove('open'); return; }

  const matches = volunteerData
    .filter(v => v.name.toLowerCase().includes(q))
    .slice(0, 8);

  if (matches.length === 0) { list.classList.remove('open'); return; }

  list.innerHTML = matches.map((v, i) =>
    `<div class="autocomplete-item" data-index="${i}" data-name="${v.name}" onmousedown="selectName('${v.name.replace(/'/g,"\\'")}')">
      ${v.name}
    </div>`
  ).join('');
  acSelectedIndex = -1;
  list.classList.add('open');
}

function onNameKeydown(e) {
  const list = document.getElementById('autocompleteList');
  const items = list.querySelectorAll('.autocomplete-item');
  if (!list.classList.contains('open')) return;

  if (e.key === 'ArrowDown') {
    acSelectedIndex = Math.min(acSelectedIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIndex));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    acSelectedIndex = Math.max(acSelectedIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIndex));
    e.preventDefault();
  } else if (e.key === 'Enter' && acSelectedIndex >= 0) {
    selectName(items[acSelectedIndex].dataset.name);
    e.preventDefault();
  } else if (e.key === 'Escape') {
    list.classList.remove('open');
  }
}

function selectName(name) {
  document.getElementById('nameInput').value = name;
  document.getElementById('autocompleteList').classList.remove('open');
  document.getElementById('phoneInput').focus();
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.autocomplete-wrapper')) {
    document.getElementById('autocompleteList').classList.remove('open');
  }
});

// ============================================================
// IDENTITY VERIFICATION
// ============================================================
async function verifyIdentity() {
  const name = document.getElementById('nameInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();

  if (!name) { showVerifyError('請輸入義工姓名'); return; }
  if (phone.length !== 4) { showVerifyError('請輸入電話尾4位數字'); return; }

  const btn = document.getElementById('verifyBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>核對中...';

  try {
    // Check locally first (faster)
    const match = volunteerData.find(v =>
      v.name.toLowerCase() === name.toLowerCase() &&
      v.phone_last4 === phone
    );

    if (match) {
      selectedVolunteer = match;
      // Check existing punch status from server
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getPunchStatus&name=${encodeURIComponent(match.name)}&date=${getTodayDate()}`);
      const json = await res.json();
      currentPunchState = json.punchIn ? { time: json.punchInTime, sheetRow: json.sheetRow } : null;
      goToStep2();
    } else {
      // Fallback: verify via server (handles partial matches / phone format variations)
      const res = await fetch(`${APPS_SCRIPT_URL}?action=verify&name=${encodeURIComponent(name)}&phone=${phone}`);
      const json = await res.json();
      if (json.success) {
        selectedVolunteer = json.volunteer;
        currentPunchState = json.punchIn ? { time: json.punchInTime, sheetRow: json.sheetRow } : null;
        goToStep2();
      } else {
        showVerifyError('找不到符合的義工記錄，請檢查姓名及電話');
      }
    }
  } catch(e) {
    showVerifyError('連線錯誤，請稍後再試');
  }

  btn.disabled = false;
  btn.innerHTML = '核對身份';
}

function showVerifyError(msg) {
  const r = document.getElementById('verifyResult');
  document.getElementById('verifyIcon').textContent = '❌';
  document.getElementById('verifyMsg').textContent = msg;
  r.className = 'verify-result error';
}

function hideVerifyResult() {
  document.getElementById('verifyResult').className = 'verify-result';
}

// ============================================================
// STEP NAVIGATION
// ============================================================
function goToStep2() {
  // Update UI
  const name = selectedVolunteer.name;
  document.getElementById('confirmedName').textContent = name;
  document.getElementById('confirmedNum').textContent = '義工編號 #' + (selectedVolunteer.rowIndex || '–');
  document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();

  updatePunchUI();
  setStep(2);
}

function updatePunchUI() {
  const badge = document.getElementById('punchStatusBadge');
  const timeDisplay = document.getElementById('checkinTimeDisplay');
  const punchBtn = document.getElementById('punchBtn');

  if (currentPunchState) {
    // Already punched in — show punch OUT
    badge.innerHTML = `<div class="punch-status-badge badge-in"><div class="badge-dot"></div>已簽到 · 工作中</div>`;
    timeDisplay.innerHTML = `<div class="checkin-time-display">簽到時間：<span>${currentPunchState.time}</span></div>`;
    punchBtn.className = 'btn btn-punch-out';
    punchBtn.textContent = 'PUNCH OUT';
  } else {
    // Not punched in
    badge.innerHTML = `<div class="punch-status-badge badge-not-in"><div class="badge-dot"></div>未簽到</div>`;
    timeDisplay.innerHTML = '';
    punchBtn.className = 'btn btn-punch-in';
    punchBtn.textContent = 'PUNCH IN';
  }
}

function setStep(n) {
  document.querySelectorAll('.step').forEach((el, i) => el.classList.toggle('active', i === n - 1));
  document.querySelectorAll('.step-dot').forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i === n - 1) el.classList.add('active');
    else if (i < n - 1) el.classList.add('done');
  });
}

function resetToStep1() {
  selectedVolunteer = null;
  currentPunchState = null;
  document.getElementById('nameInput').value = '';
  document.getElementById('phoneInput').value = '';
  hideVerifyResult();
  setStep(1);
}

// ============================================================
// PUNCH ACTION
// ============================================================
async function doPunch() {
  const punchBtn = document.getElementById('punchBtn');
  punchBtn.disabled = true;
  const isPunchOut = !!currentPunchState;
  punchBtn.innerHTML = `<span class="loading-spinner"></span>${isPunchOut ? '簽退中...' : '簽到中...'}`;

  const now = new Date();
  const timeStr = formatDateTime(now);

  try {
    const payload = {
      action: isPunchOut ? 'punchOut' : 'punchIn',
      name: selectedVolunteer.name,
      rowIndex: selectedVolunteer.rowIndex,
      date: getTodayDate(),
      time: timeStr,
      sheetRow: isPunchOut ? currentPunchState.sheetRow : null
    };

    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const json = await res.json();

    if (json.success) {
      showSuccess(isPunchOut, timeStr, json);
    } else {
      alert('打卡失敗：' + (json.error || '未知錯誤'));
      punchBtn.disabled = false;
      punchBtn.innerHTML = isPunchOut ? 'PUNCH OUT' : 'PUNCH IN';
    }
  } catch(e) {
    alert('連線錯誤，請稍後再試');
    punchBtn.disabled = false;
    punchBtn.innerHTML = isPunchOut ? 'PUNCH OUT' : 'PUNCH IN';
  }
}

function showSuccess(isPunchOut, timeStr, serverData) {
  if (isPunchOut) {
    document.getElementById('successIcon').textContent = '🏁';
    document.getElementById('successMsg').textContent = '簽退成功！多謝你今日的付出！';
    document.getElementById('successSub').textContent = '你的義工時數已自動記錄，感謝你對 Salford Hongkongers 的貢獻！';
    document.getElementById('successDetail').innerHTML = `
      <div class="success-detail-row"><span>義工姓名</span><span>${selectedVolunteer.name}</span></div>
      <div class="success-detail-row"><span>簽到時間</span><span>${currentPunchState.time}</span></div>
      <div class="success-detail-row"><span>簽退時間</span><span>${timeStr}</span></div>
      <div class="success-detail-row"><span>今日工作時長</span><span>${serverData.hours || '計算中...'}</span></div>
    `;
  } else {
    document.getElementById('successIcon').textContent = '✅';
    document.getElementById('successMsg').textContent = '簽到成功！';
    document.getElementById('successSub').textContent = '歡迎！打卡記錄已儲存，記得完成後再次 Punch Out。';
    document.getElementById('successDetail').innerHTML = `
      <div class="success-detail-row"><span>義工姓名</span><span>${selectedVolunteer.name}</span></div>
      <div class="success-detail-row"><span>簽到時間</span><span>${timeStr}</span></div>
      <div class="success-detail-row"><span>日期</span><span>${getTodayDate()}</span></div>
    `;
  }
  setStep(3);
}

// ============================================================
// HELPERS
// ============================================================
function getTodayDate() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateTime(d) {
  return `${getTodayDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
