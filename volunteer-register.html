<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e91e8c">
  <title>義工登記 — Salford Hongkongers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink:    #ff2d78;
      --neon-blue:    #00d4ff;
      --glow-pink:    0 0 8px #ff2d78, 0 0 20px rgba(255,45,120,0.5);
      --glow-blue:    0 0 8px #00d4ff, 0 0 20px rgba(0,212,255,0.5);
      --dark:         #08080f;
      --dark-2:       #0e0e1a;
      --text:         #eef0f8;
      --text-muted:   rgba(220,225,245,0.55);
      --glass-bg:     rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.10);
      --radius:       16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang HK',
                   'Hiragino Sans GB', 'Noto Sans HK', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* neon background glow */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15%  5%,  rgba(255,45,120,0.15) 0%, transparent 55%),
        radial-gradient(ellipse 55% 40% at 88% 85%, rgba(0,212,255,0.12)  0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    body > * { position: relative; z-index: 1; }

    /* ── Nav ── */
    nav {
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    nav .logo {
      color: white; font-size: 1.05rem; font-weight: 800;
      text-decoration: none; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 10px;
    }
    nav .logo .logo-mark {
      width: 36px; height: 36px;
      background: #08080f;
      border: 2px solid var(--neon-pink);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; color: var(--neon-pink);
      box-shadow: var(--glow-pink);
    }
    nav .nav-links { display: flex; align-items: center; gap: 4px; }
    nav .nav-links a {
      color: rgba(255,255,255,0.7); text-decoration: none;
      padding: 6px 14px; border-radius: 50px;
      font-size: 0.88rem; transition: all 0.2s;
    }
    nav .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    nav .nav-links a.active { color: var(--neon-pink); background: rgba(255,45,120,0.12); font-weight: 700; }
    @media (max-width: 520px) {
      nav .nav-links a { padding: 5px 10px; font-size: 0.8rem; }
    }

    /* ── Form wrapper ── */
    .form-wrapper {
      max-width: 500px;
      margin: 40px auto;
      padding: 0 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 36px 32px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-pink) 40%, var(--neon-blue) 60%, transparent);
      box-shadow: var(--glow-pink);
    }
    @media (max-width: 480px) { .card { padding: 28px 20px; } }

    /* ── Logo / title ── */
    .logo-area {
      text-align: center;
      margin-bottom: 22px;
    }
    .logo-area img {
      height: 52px; object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255,45,120,0.4));
    }
    h1 {
      font-size: 1.5rem; font-weight: 900; color: #fff;
      text-align: center; margin-bottom: 6px;
      text-shadow: 0 0 16px rgba(255,255,255,0.2);
    }
    .subtitle {
      text-align: center; color: var(--text-muted);
      font-size: 0.88rem; margin-bottom: 28px; line-height: 1.5;
    }

    /* ── Form elements ── */
    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 0.83rem; font-weight: 700;
      color: rgba(220,225,245,0.8); margin-bottom: 7px; letter-spacing: 0.2px;
    }
    label .req { color: var(--neon-pink); }
    input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input::placeholder { color: rgba(220,225,245,0.3); }
    input:focus {
      border-color: var(--neon-pink);
      box-shadow: 0 0 0 3px rgba(255,45,120,0.15);
      background: rgba(255,255,255,0.08);
    }
    .row { display: flex; gap: 12px; }
    .row .form-group { flex: 1; }
    .note { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }

    /* ── Submit Button ── */
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--neon-pink);
      color: #fff; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 800;
      font-family: inherit;
      cursor: pointer; letter-spacing: 0.5px;
      box-shadow: var(--glow-pink);
      transition: all 0.2s; margin-top: 8px;
      text-transform: uppercase;
    }
    .btn:hover {
      background: #ff4d96;
      box-shadow: 0 0 16px #ff2d78, 0 0 40px rgba(255,45,120,0.5);
      transform: translateY(-1px);
    }
    .btn:disabled { background: rgba(255,255,255,0.15); box-shadow: none; cursor: not-allowed; transform: none; }

    /* ── Alert ── */
    .alert {
      padding: 14px 16px; border-radius: 10px;
      font-size: 0.9rem; font-weight: 600;
      margin-top: 16px; display: none; text-align: center; line-height: 1.5;
    }
    .alert.success {
      background: rgba(57,255,20,0.12);
      color: #39ff14;
      border: 1px solid rgba(57,255,20,0.35);
    }
    .alert.error {
      background: rgba(255,45,120,0.12);
      color: var(--neon-pink);
      border: 1px solid rgba(255,45,120,0.35);
    }

    /* ── Checkin link ── */
    .checkin-link {
      text-align: center; margin-top: 22px;
      font-size: 0.85rem; color: var(--text-muted);
    }
    .checkin-link a {
      color: var(--neon-pink); text-decoration: none; font-weight: 700;
    }
    .checkin-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo">
      <span class="logo-mark">SHK</span>
      <span>Salford Hongkongers</span>
    </a>
    <div class="nav-links">
      <a href="index.html">主頁</a>
      <a href="forms.html">登記表格</a>
      <a href="volunteer-checkin.html">義工簽到</a>
      <a href="donate.html">支持我們</a>
    </div>
  </nav>

  <div class="form-wrapper">
    <div class="card">
      <div class="logo-area">
        <img src="images/logo.png" alt="Salford Hongkongers" onerror="this.style.display='none'">
      </div>
      <h1>義工登記</h1>
      <p class="subtitle">Volunteer Registration<br>Salford Hongkongers CIC</p>

      <form id="regForm">
        <div class="form-group">
          <label>義工姓名 <span class="req">*</span></label>
          <input type="text" id="name" placeholder="例：陳大文" required>
        </div>

        <div class="row">
          <div class="form-group">
            <label>電話</label>
            <input type="tel" id="phone" placeholder="例：07700 900123">
          </div>
          <div class="form-group">
            <label>WhatsApp</label>
            <input type="tel" id="whatsapp" placeholder="例：+447700900123">
          </div>
        </div>

        <div class="form-group">
          <label>電郵 <span class="req">*</span></label>
          <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
          <label>年齡範圍</label>
          <input type="text" id="age" placeholder="例：18-25">
          <p class="note">可填寫年齡範圍，如：18-25、26-35</p>
        </div>

        <div class="form-group">
          <label>住址（城市）</label>
          <input type="text" id="city" placeholder="例：Salford, Manchester, Bolton">
        </div>

        <div class="form-group">
          <label>興趣／專長</label>
          <input type="text" id="skills" placeholder="例：攝影、設計、社交媒體、活動策劃">
        </div>

        <div class="form-group">
          <label>備註</label>
          <input type="text" id="notes" placeholder="任何想讓我們知道的事">
        </div>

        <button type="submit" class="btn" id="submitBtn">提交登記</button>
      </form>

      <div id="alertBox" class="alert"></div>

      <div class="checkin-link">
        已登記？<a href="volunteer-checkin.html">前往義工簽到</a>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5XghDdEBG41krkKoD5-860RptJozTLAb6yX4p_k7UIyDR1xdiZlmFLBi9ZXlKhMtU/exec';
    const regForm  = document.getElementById('regForm');
    const btn      = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');

    regForm.addEventListener('submit', async (ev) => {
      ev.preventDefault();

      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!name || !email) {
        showAlert('請填寫必填欄位（姓名及電郵）', 'error');
        return;
      }

      btn.disabled    = true;
      btn.textContent = '提交中...';

      const payload = {
        action:    'register',
        name:      name,
        phone:     document.getElementById('phone').value.trim(),
        whatsapp:  document.getElementById('whatsapp').value.trim(),
        email:     email,
        age:       document.getElementById('age').value.trim(),
        city:      document.getElementById('city').value.trim(),
        skills:    document.getElementById('skills').value.trim(),
        notes:     document.getElementById('notes').value.trim(),
        timestamp: new Date().toISOString()
      };

      try {
        const resp = await fetch(APPS_SCRIPT_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
          body:    JSON.stringify(payload)
        });

        const result = await resp.json();

        if (result.duplicate) {
          showAlert('你已經登記過了！如有問題請聯絡我們。', 'error');
          return;
        }
        if (!result.success) {
          showAlert('提交失敗：' + (result.error || result.message || '請稍後再試'), 'error');
          return;
        }

        showAlert('登記成功！歡迎加入 Salford Hongkongers 義工團隊！', 'success');
        regForm.reset();
        setTimeout(() => { window.location.href = 'volunteer-checkin.html'; }, 2000);

      } catch (err) {
        console.error(err);
        showAlert('提交失敗，請稍後再試或聯絡我們', 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = '提交登記';
      }
    });

    function showAlert(msg, type) {
      alertBox.textContent   = msg;
      alertBox.className     = 'alert ' + type;
      alertBox.style.display = 'block';
      setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
    }
  </script>
</body>
</html>
