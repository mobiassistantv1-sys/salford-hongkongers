<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>義工登記 — Salford Hongkongers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 480px;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo img {
      height: 56px;
      object-fit: contain;
    }
    h1 {
      font-size: 1.4rem;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #c0392b; }
    .row { display: flex; gap: 12px; }
    .row .form-group { flex: 1; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: #a93226; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .alert {
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-top: 16px;
      display: none;
    }
    .alert.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .alert.error   { background: #fdedea; color: #c62828; border: 1px solid #ef9a9a; }
    .checkin-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: #666;
    }
    .checkin-link a { color: #c0392b; text-decoration: none; font-weight: 600; }
    .note {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="images/logo.png" alt="Salford Hongkongers" onerror="this.style.display='none'">
    </div>
    <h1>義工登記</h1>
    <p class="subtitle">Volunteer Registration<br>Salford Hongkongers CIC</p>

    <form id="regForm">
      <div class="form-group">
        <label>義工姓名 <span style="color:#c0392b">*</span></label>
        <input type="text" id="name" placeholder="例：陳大文" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label>電話</label>
          <input type="tel" id="phone" placeholder="例：07700 900123">
        </div>
        <div class="form-group">
          <label>WhatsApp</label>
          <input type="tel" id="whatsapp" placeholder="例：+447700900123">
        </div>
      </div>

      <div class="form-group">
        <label>電郵 <span style="color:#c0392b">*</span></label>
        <input type="email" id="email" placeholder="example@email.com" required>
      </div>

      <div class="form-group">
        <label>年齡範圍</label>
        <input type="text" id="age" placeholder="例：18-25">
        <p class="note">可填寫年齡範圍，如：18-25、26-35</p>
      </div>

      <div class="form-group">
        <label>住址（城市）</label>
        <input type="text" id="city" placeholder="例：Salford, Manchester, Bolton">
      </div>

      <div class="form-group">
        <label>興趣／專長</label>
        <input type="text" id="skills" placeholder="例：攝影、設計、社交媒體、活動策劃">
      </div>

      <div class="form-group">
        <label>備註</label>
        <input type="text" id="notes" placeholder="任何想讓我們知道的事">
      </div>

      <button type="submit" class="btn" id="submitBtn">提交登記</button>
    </form>

    <div id="alert" class="alert"></div>

    <div class="checkin-link">
      已登記？<a href="volunteer-checkin.html">前往義工簽到</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('regForm');
    const btn = document.getElementById('submitBtn');
    const alert = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      
      if (!name || !email) {
        showAlert('請填寫必填欄位（姓名及電郵）', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = '提交中...';

      const formData = {
        name: name,
        phone: document.getElementById('phone').value.trim(),
        whatsapp: document.getElementById('whatsapp').value.trim(),
        email: email,
        age: document.getElementById('age').value.trim(),
        city: document.getElementById('city').value.trim(),
        skills: document.getElementById('skills').value.trim(),
        notes: document.getElementById('notes').value.trim(),
        timestamp: new Date().toISOString()
      };

      try {
        const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE'; // <-- 部署 Apps Script 後換成 Web App URL

        // Build payload with action field for the unified script
        const submitData = Object.assign({ action: 'register' }, formData);

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(submitData)
        });

        const result = await response.json();

        if (result.duplicate) {
          showAlert('你已經登記過了！如有問題請聯絡我們。', 'error');
          btn.disabled = false;
          btn.textContent = '提交登記';
          return;
        }
        if (!result.success) {
          showAlert('提交失敗：' + (result.error || result.message || '請稍後再試'), 'error');
          btn.disabled = false;
          btn.textContent = '提交登記';
          return;
        }

        showAlert('登記成功！歡迎加入 Salford Hongkongers 義工團隊！', 'success');
        form.reset();
        
        setTimeout(() => {
          window.location.href = 'volunteer-checkin.html';
        }, 2000);

      } catch (error) {
        console.error('Error:', error);
        showAlert('提交失敗，請稍後再試或聯絡我們', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '提交登記';
      }
    });

    function showAlert(message, type) {
      alert.textContent = message;
      alert.className = `alert ${type}`;
      alert.style.display = 'block';
      setTimeout(() => {
        alert.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
