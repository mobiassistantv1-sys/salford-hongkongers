<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>義工登記 — Salford Hongkongers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 480px;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo img {
      height: 56px;
      object-fit: contain;
    }
    h1 {
      font-size: 1.4rem;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #c0392b; }
    .row { display: flex; gap: 12px; }
    .row .form-group { flex: 1; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: #a93226; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .alert {
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-top: 16px;
      display: none;
    }
    .alert.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .alert.error   { background: #fdecea; color: #c62828; border: 1px solid #ef9a9a; }
    .checkin-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: #666;
    }
    .checkin-link a { color: #c0392b; text-decoration: none; font-weight: 600; }
    .note {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="images/logo.png" alt="Salford Hongkongers" onerror="this.style.display='none'">
    </div>
    <h1>義工登記</h1>
    <p class="subtitle">Volunteer Registration<br>Salford Hongkongers CIC</p>

    <form id="regForm">
      <div class="form-group">
        <label>義工姓名 <span style="color:#c0392b">*</span></label>
        <input type="text" name="name" placeholder="例: 陳大明" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label>電話號碼 <span style="color:#c0392b">*</span></label>
          <input type="tel" name="phone" placeholder="07123456789" required>
        </div>
        <div class="form-group">
          <label>電郵地址</label>
          <input type="email" name="email" placeholder="name@example.com">
        </div>
      </div>

      <div class="form-group">
        <label>緊急聯絡人 <span style="color:#c0392b">*</span></label>
        <input type="text" name="emergency_contact" placeholder="例: 媽媽 - 07987654321" required>
        <p class="note">請註明稱謂同聯絡號碼</p>
      </div>

      <div class="form-group">
        <label>居住地區</label>
        <input type="text" name="location" placeholder="例: Salford Quays">
      </div>

      <div class="form-group">
        <label>備註</label>
        <input type="text" name="notes" placeholder="特別技能、可以幫手嘅範疇">
      </div>

      <button type="submit" class="btn">提交登記</button>
    </form>

    <div id="alertBox" class="alert"></div>

    <div class="checkin-link">
      <a href="volunteer-checkin.html">→ 返去義工簽到頁面</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('regForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = form.querySelector('.btn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // Disable button
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';

      // Collect form data
      const formData = new FormData(form);
      const data = {
        formType: 'volunteer',
        name: formData.get('name'),
        phone: formData.get('phone'),
        email: formData.get('email') || '',
        emergency_contact: formData.get('emergency_contact'),
        location: formData.get('location') || '',
        notes: formData.get('notes') || '',
        timestamp: new Date().toISOString()
      };

      try {
        // Google Apps Script endpoint — use URL params to bypass CORS opaque issue
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyU6W8W3vm5R7TGd4A9t2qD3NZp5NI3PaXyptlBiiJawL_SK7LcZqfkX1v4wU-nenw/exec';
        const params = new URLSearchParams(data);
        const response = await fetch(SCRIPT_URL + '?' + params.toString(), {
          method: 'GET',
          mode: 'no-cors'
        });

        // mode: no-cors => opaque response, assume success if no error thrown
        showAlert('success', '✓ 登記成功！多謝你支持社群活動。我哋會盡快聯絡你。');
        form.reset();

      } catch (error) {
        console.error('Error:', error);
        showAlert('error', '✗ 提交失敗，請稍後再試或聯絡負責人。');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '提交登記';
      }
    });

    function showAlert(type, message) {
      alertBox.textContent = message;
      alertBox.className = 'alert ' + type;
      alertBox.style.display = 'block';
      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
